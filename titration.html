<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Titration Builder by Dr Benjamin Murrie</title>
<style>
  :root{
    --bg:#f6f7fb;
    --card:#ffffff;
    --border:#e2e8f0;
    --text:#0f172a;
    --muted:#64748b;
    --primary:#1e3a5f;
    --primary-bg:#e7eef9;
    --green:#16a34a;
    --green-bg:#dcfce7;
    --amber:#f59e0b;
    --amber-bg:#fef3c7;
    --red:#dc2626;
    --red-bg:#fee2e2;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --r:10px;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 4px 12px rgba(15,23,42,.04);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.45}
  body{padding-bottom:80px}

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  header{background:#0f172a;color:#e2e8f0;padding:14px 20px;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:20}
  .header-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;max-width:1400px;margin:0 auto}
  header h1{margin:0;font-size:16px;font-weight:700;letter-spacing:.01em;color:#f1f5f9}
  header h1 .sub{display:block;font:500 11px var(--sans);color:#94a3b8;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
  .reset-btn{background:#450a0a;border:1.5px solid #dc2626;color:#fca5a5;font:700 11px var(--sans);padding:5px 11px;border-radius:999px;cursor:pointer}
  .reset-btn:hover{background:#7f1d1d}

  /* ── LAYOUT ─────────────────────────────────────────────────────────── */
  main{max-width:1400px;margin:0 auto;padding:20px;display:grid;grid-template-columns:minmax(380px,1fr) minmax(440px,1.3fr);gap:20px;align-items:start}
  @media (max-width:1100px){main{grid-template-columns:1fr;padding:14px}}
  @media (max-width:560px){main{padding:10px;gap:12px}}

  /* ── CARDS ──────────────────────────────────────────────────────────── */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .card-head{padding:12px 16px;border-bottom:1px solid var(--border);font:700 13px var(--sans);color:var(--primary);background:linear-gradient(180deg,#fafbff 0%,#f4f6fb 100%);display:flex;align-items:center;gap:8px}
  .card-body{padding:14px 16px}

  /* ── MED PICKER ─────────────────────────────────────────────────────── */
  .picker-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .picker-row select,.picker-row input{flex:1;min-width:160px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font:14px var(--sans);background:#fff}
  .picker-row select:focus,.picker-row input:focus{outline:none;border-color:var(--primary)}
  .btn{padding:8px 14px;border-radius:7px;border:1.5px solid var(--primary);background:var(--primary);color:#fff;font:700 12px var(--sans);cursor:pointer;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
  .btn:hover{background:#274b78;border-color:#274b78}
  .btn.ghost{background:#fff;color:var(--primary)}
  .btn.ghost:hover{background:var(--primary-bg)}
  .btn.danger{background:#fff;border-color:var(--red);color:var(--red)}
  .btn.danger:hover{background:var(--red-bg)}
  .btn.sm{padding:5px 9px;font-size:11px}

  .med-list{display:flex;flex-direction:column;gap:10px}
  .med-card{border:1px solid var(--border);border-radius:8px;background:#fafbff;padding:10px 12px}
  .med-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .med-name{font:700 14px var(--sans);color:var(--primary)}
  .med-generic{font:400 12px var(--sans);color:var(--muted);margin-left:6px}
  .med-class-pill{display:inline-block;padding:2px 8px;border-radius:999px;font:700 10px var(--sans);text-transform:uppercase;letter-spacing:.06em;margin-left:6px}
  .med-class-pill.stimulant{background:var(--amber-bg);color:#b45309}
  .med-class-pill.nonstim{background:#dbeafe;color:#1e40af}
  .med-class-pill.antidepressant{background:#dbeafe;color:#1e40af}
  .med-class-pill.mood_stabiliser{background:#ede9fe;color:#5b21b6}
  .med-class-pill.antipsychotic_oral{background:#fce7f3;color:#9d174d}
  .med-class-pill.antipsychotic_lai{background:#fce7f3;color:#9d174d}
  .med-class-pill.anxiolytic{background:#fef3c7;color:#92400e}
  .med-class-pill.gabapentinoid{background:#fef3c7;color:#92400e}
  .med-class-pill.anticholinergic{background:#f1f5f9;color:#475569}
  .med-class-pill.cognitive{background:#dcfce7;color:#166534}
  .med-class-pill.aud{background:#fee2e2;color:#991b1b}
  .med-class-pill.oud{background:#fee2e2;color:#991b1b}
  .med-class-pill.metabolic{background:#dcfce7;color:#166534}
  .med-class-pill.anticonvulsant{background:#ede9fe;color:#5b21b6}
  .med-class-pill.parkinson{background:#e0e7ff;color:#3730a3}
  .med-class-pill.analgesic{background:#ffedd5;color:#9a3412}
  .med-class-pill.other{background:#f1f5f9;color:#475569}

  .auth-line{font:400 11.5px/1.4 var(--sans);color:#475569;background:#fff7ed;border:1px solid #fde68a;padding:6px 10px;border-radius:6px;margin:6px 0}

  /* Section sub-heading inside a med card */
  .med-sub-h{font:700 10px var(--sans);text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:10px 0 6px}

  /* Titration step builder (ported from adhd5.html) */
  .tit-step-list{display:flex;flex-direction:column;gap:0;margin-top:4px}
  .tit-step-row{display:flex;align-items:stretch;gap:0}
  .tit-step-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:24px}
  .tit-step-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid #fff;box-shadow:0 0 0 2px var(--primary);flex-shrink:0;margin-top:6px}
  .tit-step-dot.ongoing{background:var(--green);box-shadow:0 0 0 2px var(--green)}
  .tit-step-connector{width:2px;background:#dbeafe;flex:1;margin:2px 0}
  .tit-step-row:last-child .tit-step-connector{display:none}
  .tit-step-content{flex:1;padding:0 0 14px 8px;min-width:0}
  .tit-step-header{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
  .tit-step-badge{font:700 11px var(--sans);color:var(--primary);background:#dbeafe;border-radius:5px;padding:3px 8px;white-space:nowrap}
  .tit-step-badge.ongoing{background:var(--green-bg);color:var(--green)}
  .tit-dur-inp{width:38px;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:3px 5px;font:12px var(--sans);text-align:center;background:#fff}
  .tit-dur-sel{border:1px solid var(--border);border-radius:5px;color:var(--text);padding:3px 5px;font:12px var(--sans);background:#fff}
  .tit-ongoing-lbl{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);cursor:pointer}
  .tit-rm-step{background:none;border:none;color:#c8cdd9;font-size:14px;padding:0 4px;cursor:pointer;margin-left:auto}
  .tit-rm-step:hover{color:var(--red)}
  .tit-dose-rows{display:flex;flex-direction:column;gap:6px}
  .tit-dose-item{display:flex;align-items:center;gap:5px;flex-wrap:wrap;row-gap:6px;min-width:0}
  .tit-dose-time{flex:0 0 88px;width:88px;border:1px solid var(--border);border-radius:6px;color:#1e293b;padding:0 8px;font:600 12px var(--sans);background:#fff;height:32px;box-sizing:border-box}
  .tit-dose-ctrl{display:flex;align-items:center;gap:5px;flex:1 1 auto;min-width:0;flex-wrap:wrap}
  .tit-stepper{flex:0 0 auto;display:grid;grid-template-columns:30px 38px 30px;background:#fff;border:1px solid #cbd5e1;border-radius:6px;overflow:hidden;align-items:stretch;height:32px}
  .tit-ds-btn{background:#eef2f7;border:none;color:#0f172a;font:700 16px var(--sans);display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .tit-ds-btn:hover,.tit-ds-btn:active{background:var(--primary);color:#fff}
  .tit-ds-lbl{display:flex;align-items:center;justify-content:center;font:700 14px var(--sans);color:#0f172a;background:#fff;border-left:1px solid #cbd5e1;border-right:1px solid #cbd5e1;padding:0 2px}
  .tit-form-lbl{font:600 12px var(--sans);color:#475569;white-space:nowrap}
  .tit-dose-free{flex:1 1 140px;min-width:0;border:1px solid var(--border);border-radius:6px;color:#0f172a;padding:0 9px;font:13px var(--sans);background:#fff;height:32px;box-sizing:border-box}
  .tit-cap-sel{background:#fff;border:1px solid #cbd5e1;border-radius:6px;color:#0f172a;padding:0 8px;font:600 12px var(--sans);height:32px}
  .tit-fixed-strength{background:var(--primary-bg);border:1px solid #c7d6ec;border-radius:6px;color:var(--primary);padding:0 10px;font:700 12px var(--sans);white-space:nowrap;height:32px;display:inline-flex;align-items:center}
  .tit-dose-actions{display:flex;align-items:center;gap:3px;flex:0 0 auto;margin-left:auto}
  .tit-icon-btn{padding:0;width:28px;height:28px;border-radius:6px;font:13px var(--sans);border:1.5px solid #cbd5e1;background:#fff;color:#475569;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .tit-icon-btn:hover,.tit-icon-btn:active{border-color:var(--primary);color:var(--primary);background:#eef2f7}
  .tit-prn-btn{padding:0 8px;height:28px;border-radius:6px;font:700 10px var(--sans);border:1.5px solid #cbd5e1;background:#fff;color:#94a3b8;cursor:pointer;white-space:nowrap}
  .tit-prn-btn.on{border-color:#b45309;background:#fff7ed;color:#b45309}
  .tit-dose-rm{background:none;border:none;color:#94a3b8;font-size:16px;line-height:1;padding:0;width:24px;height:28px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .tit-dose-rm:hover{color:var(--red)}
  .tit-step-total{margin-top:8px;padding:5px 10px;background:#f0f6ff;border:1px dashed #93c5fd;border-radius:6px;font:600 12px var(--sans);color:var(--primary);display:inline-block}
  .tit-step-note{font:12px var(--sans);color:#0f172a;background:#fafbfc;border:1px solid #cbd5e1;border-radius:6px;outline:none;width:100%;margin-top:8px;padding:7px 10px;box-sizing:border-box}
  .tit-step-note:focus{border-color:var(--primary);background:#fff}
  .tit-step-note::placeholder{color:#94a3b8;font-style:italic}
  .tit-step-foot{display:flex;align-items:center;gap:6px;padding:6px 0 0;flex-wrap:wrap}
  .tit-time-sel{background:#f3f5f9;border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:3px 6px;font:11px var(--sans);cursor:pointer}
  .tit-add-step{background:none;border:none;color:var(--primary);font:600 11px var(--sans);padding:0;text-decoration:underline;cursor:pointer}

  /* ── OUTPUT TABS ────────────────────────────────────────────────────── */
  .out-tabs{display:flex;gap:2px;background:#0f172a;padding:6px 6px 0 6px;border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid #1e293b}
  .out-tab{padding:8px 14px;border:none;background:transparent;color:#94a3b8;font:700 12px var(--sans);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;border-radius:6px 6px 0 0}
  .out-tab:hover{color:#cbd5e1}
  .out-tab.active{background:#fafbff;color:var(--primary)}

  .out-body{background:#fafbff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
  .out-pane{display:none;padding:16px 18px;min-height:300px}
  .out-pane.active{display:block}
  .out-actions{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}

  /* eScript styling */
  .escript{font:13px/1.55 var(--mono);background:#fff;border:1px solid var(--border);border-radius:7px;padding:14px 16px;white-space:pre-wrap;color:#1e293b}

  /* Letter styling */
  .letter{font:14px/1.6 'Georgia','Times New Roman',serif;background:#fff;border:1px solid var(--border);border-radius:7px;padding:18px 22px;color:#1f2937}
  .letter p{margin:0 0 10px 0}

  /* Table output */
  .out-pane{overflow-x:auto}
  .out-pane .schedule{width:100%;min-width:520px;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .schedule thead th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;font:700 11px var(--sans);text-transform:uppercase;letter-spacing:.04em}
  .schedule tbody td{padding:9px 10px;border-bottom:1px solid #eef2f7;vertical-align:top}
  .schedule tbody tr:last-child td{border-bottom:none}
  .schedule tbody tr:nth-child(even){background:#fafbff}

  /* Empty */
  .empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;background:#fafbff;border:1px dashed var(--border);border-radius:8px}

  /* Print */
  @media print{
    header,.out-tabs,.out-actions,.btn,.icon-btn,.reset-btn,.top-fields{display:none !important}
    main{display:block;padding:0}
    .card{box-shadow:none;border:none}
    .out-pane{display:block !important;padding:0;page-break-inside:avoid}
  }
  /* Visually hidden */
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  /* Footer */
  footer{max-width:1400px;margin:0 auto;padding:14px 20px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>Titration Builder<span class="sub">by Dr Benjamin Murrie · FRANZCP</span></h1>
    <button class="reset-btn" onclick="resetAll()" title="Clear all medications">Reset</button>
  </div>
</header>

<main>
  <!-- ───────────── LEFT: BUILDER ───────────── -->
  <section>
    <div class="card">
      <div class="card-head">Add medication</div>
      <div class="card-body">
        <div class="picker-row">
          <select id="medClassFilter">
            <option value="all">All classes</option>
            <option value="antidepressant">Antidepressants</option>
            <option value="mood_stabiliser">Mood stabilisers</option>
            <option value="antipsychotic_oral">Antipsychotics — oral</option>
            <option value="antipsychotic_lai">Antipsychotics — LAI</option>
            <option value="anxiolytic">Anxiolytics / hypnotics</option>
            <option value="gabapentinoid">Gabapentinoids</option>
            <option value="anticholinergic">Anticholinergics</option>
            <option value="stimulant">Stimulants (ADHD)</option>
            <option value="nonstim">Non-stimulants (ADHD)</option>
            <option value="cognitive">Dementia / cognitive</option>
            <option value="aud">Alcohol use disorder</option>
            <option value="oud">Opioid use disorder</option>
            <option value="metabolic">Metabolic / weight</option>
            <option value="anticonvulsant">Anticonvulsants</option>
            <option value="parkinson">Parkinson's</option>
            <option value="analgesic">Analgesics</option>
            <option value="other">Other (esketamine, cannabis)</option>
          </select>
          <select id="medPicker">
            <option value="">Choose a medication…</option>
          </select>
          <button class="btn" onclick="addSelectedMed()">Add</button>
        </div>
        <div id="medList" class="med-list"></div>
        <div id="medEmpty" class="empty" style="margin-top:6px">No medications yet — pick one above to begin.</div>
      </div>
    </div>
  </section>

  <!-- ───────────── RIGHT: OUTPUTS ───────────── -->
  <section>
    <div class="card">
      <div class="out-tabs">
        <button class="out-tab active" data-tab="escript" onclick="setTab('escript')">eScript</button>
        <button class="out-tab" data-tab="letter" onclick="setTab('letter')">Letter prose</button>
        <button class="out-tab" data-tab="table" onclick="setTab('table')">Table</button>
      </div>
      <div class="out-body">
        <div class="out-actions">
          <button class="btn sm ghost" onclick="copyActive()">Copy</button>
          <button class="btn sm ghost" onclick="printActive()">Print / PDF</button>
        </div>
        <div id="out-escript" class="out-pane active"></div>
        <div id="out-letter" class="out-pane"></div>
        <div id="out-table" class="out-pane"></div>
      </div>
    </div>
  </section>
</main>

<footer>Titration Builder · Use alongside clinical judgement. Confirm doses, authority requirements and state-specific rules before issuing any prescription.</footer>

<script>
'use strict';

/* ───────────────────────── MED CATALOGUE ─────────────────────────────────
   Each med:
   - name        : display name
   - generic     : printed generic name for scripts
   - class       : 'stimulant' | 'nonstim' | 'other'
   - schedule    : 'S8' | 'S4' | etc.
   - form        : 'tablet' | 'capsule' | 'tablet (IR)' etc.
   - strengths   : array of available strengths (numbers)
   - unit        : 'mg' | 'mcg'
   - authority   : default authority / prescribing footnote
   - mitte       : default total quantity (string)
   - repeats     : default repeats (number)
   - intervalRule: 20-day for S8 stimulants etc.
   - steps       : default titration steps
       label  : 'Days 1–7' / 'Week 1' etc.
       dur    : duration string e.g. '7 days', 'monthly', or '' for maintenance
       sig    : sig text e.g. '½ tab BD'  (the dose+frequency)
       totalDose: optional total daily dose string e.g. '5 mg'
       notes  : any specific instructions
   New medications can be added by inserting another entry — no other code
   needs to change.
─────────────────────────────────────────────────────────────────────────── */
const MED_CATALOG = {
  dex_ir: {
    name:'Dexamphetamine IR', generic:'Dexamphetamine sulfate',
    class:'stimulant', subclass:'Stimulant', schedule:'S8',
    form:'tablet', strengths:[5], unit:'mg',
    authority:'S8 stimulant authority required. Add CA2023 (NSW). 20-day prescription interval.',
    steps:[
      {dur:2,unit:'days',ongoing:false,note:'Start low. Take on waking.',
        doses:[{t:'morning',type:'str',s:5,q:0.5},{t:'midday',type:'str',s:5,q:0.5}]},
      {dur:7,unit:'days',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:5,q:1},{t:'midday',type:'str',s:5,q:1}]},
      {dur:7,unit:'days',ongoing:false,note:'Good tolerability required to proceed.',
        doses:[{t:'morning',type:'str',s:5,q:2},{t:'midday',type:'str',s:5,q:1}]},
      {dur:1,unit:'days',ongoing:true,note:'Continue at this dose until next review.',
        doses:[{t:'morning',type:'str',s:5,q:2},{t:'midday',type:'str',s:5,q:2}]}
    ]
  },
  ritalin_ir: {
    name:'Ritalin IR', generic:'Methylphenidate hydrochloride',
    class:'stimulant', subclass:'Stimulant', schedule:'S8',
    form:'tablet', strengths:[10], unit:'mg',
    authority:'S8 stimulant authority required. Add CA2023 (NSW). 20-day prescription interval.',
    steps:[
      {dur:2,unit:'days',ongoing:false,note:'Start low.',
        doses:[{t:'morning',type:'str',s:10,q:0.5},{t:'midday',type:'str',s:10,q:0.5}]},
      {dur:7,unit:'days',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:10,q:1},{t:'midday',type:'str',s:10,q:1}]},
      {dur:7,unit:'days',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:10,q:2},{t:'midday',type:'str',s:10,q:1}]},
      {dur:1,unit:'days',ongoing:true,note:'',
        doses:[{t:'morning',type:'str',s:10,q:2},{t:'midday',type:'str',s:10,q:2}]}
    ]
  },
  ritalin_la: {
    name:'Ritalin LA', generic:'Methylphenidate (modified-release)',
    class:'stimulant', subclass:'Stimulant', schedule:'S8',
    form:'capsule', strengths:[10,20,30,40,60], unit:'mg',
    authority:'S8 stimulant authority required. Add CA2023 (NSW). Once daily. Capsule can be sprinkled on soft food.',
    steps:[
      {dur:1,unit:'weeks',ongoing:false,note:'Sprinkle on soft food if needed.',
        doses:[{t:'morning',type:'str',s:10,q:1}]},
      {dur:2,unit:'weeks',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:20,q:1}]},
      {dur:2,unit:'weeks',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:30,q:1}]},
      {dur:1,unit:'days',ongoing:true,note:'Review at next appointment.',
        doses:[{t:'morning',type:'str',s:40,q:1}]}
    ]
  },
  concerta: {
    name:'Concerta', generic:'Methylphenidate OROS',
    class:'stimulant', subclass:'Stimulant', schedule:'S8',
    form:'tablet', strengths:[18,27,36,54], unit:'mg',
    authority:'S8 stimulant authority required. PBS Authority — diagnosis must have been made before age 18. Add CA2023 (NSW). Swallow whole — do NOT crush.',
    steps:[
      {dur:1,unit:'weeks',ongoing:false,note:'Swallow whole — must not be crushed.',
        doses:[{t:'morning',type:'str',s:18,q:1}]},
      {dur:2,unit:'weeks',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:27,q:1}]},
      {dur:2,unit:'weeks',ongoing:false,note:'',
        doses:[{t:'morning',type:'str',s:36,q:1}]},
      {dur:1,unit:'days',ongoing:true,note:'Maximum daily dose.',
        doses:[{t:'morning',type:'str',s:54,q:1}]}
    ]
  },
  vyvanse: {
    name:'Vyvanse', generic:'Lisdexamfetamine dimesilate',

function populatePicker(){
  const cls=$('medClassFilter').value;
  const picker=$('medPicker');
  picker.innerHTML='<option value="">Choose a medication…</option>';
  // Bucket meds by subclass (preserves catalogue order within group).
  const groups={};
  const groupOrder=[];
  Object.entries(MED_CATALOG).forEach(([key,m])=>{
    if(cls!=='all'&&m.class!==cls)return;
    const sub=m.subclass||'Other';
    if(!groups[sub]){groups[sub]=[];groupOrder.push(sub);}
    groups[sub].push([key,m]);
  });
  groupOrder.forEach(sub=>{
    const og=document.createElement('optgroup');
    og.label=sub;
    groups[sub].sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([key,m])=>{
      const opt=document.createElement('option');
      opt.value=key;opt.textContent=m.name;
      og.appendChild(opt);
    });
    picker.appendChild(og);
  });
}

/* ─────────────────────── TITRATION HELPERS ────────────────────────────── */
const FRAC_QS=[0.25,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5];
const WHOLE_QS=[1,2,3,4,5,6,7,8];
const TIT_TIMES=['morning','midday','afternoon','evening','night','bedtime'];
function getQSteps(m){
  // Fractional quantities only make sense for plain tablets.
  const form=(m.form||'').toLowerCase();
  return /^tab/.test(form)?FRAC_QS:WHOLE_QS;
}
function fmtQ(q){
  return q===0.25?'¼':q===0.5?'½':q===0.75?'¾':q===1?'1':q===1.5?'1½':q===2?'2':q===2.5?'2½':q===3?'3':q===3.5?'3½':q===4?'4':q===4.5?'4½':q===5?'5':String(q);
}
function formNoun(m,q){
  const f=(m.form||'tab').split(/[\s(]/)[0]; // e.g. 'tablet (CR)' → 'tablet'
  return f+((q===1||q===0.5||q===0.25)?'':'s');
}
function buildDoseLabel(m,d){
  if(d.type==='free')return d.l||'';
  const u=m.unit||'mg';
  const q=d.q==null?1:d.q;
  const s=d.s==null?0:d.s;
  const total=Math.round(q*s*100)/100;
  return fmtQ(q)+' '+formNoun(m,q)+' ('+total+u+')';
}
function titAutoLabel(steps,si){
  let day=0;
  for(let i=0;i<=si;i++){
    const st=steps[i];
    if(st.ongoing)return 'Ongoing';
    const dd=st.unit==='weeks'?(st.dur||1)*7:(st.dur||1);
    const start=day+1;day+=dd;
    if(i<si)continue;
    if(st.unit==='weeks'){
      const ws=Math.ceil(start/7),we=Math.ceil(day/7);
      return ws===we?'Week '+ws:'Weeks '+ws+'-'+we;
    }
    return start===day?'Day '+start:'Days '+start+'-'+day;
  }
  return 'Step '+(si+1);
}
function totalDailyDose(m,st){
  let total=0;
  st.doses.forEach(d=>{
    if(d.type==='str')total+=(d.q||0)*(d.s||0);
    else if(d.type==='free'&&d.l){
      const matches=String(d.l).match(/(\d+(?:\.\d+)?)\s*(?:mg|mcg)\b/gi);
      if(matches&&matches.length){
        const nums=matches.map(s=>parseFloat(s));
        total+=Math.max.apply(null,nums);
      }
    }
  });
  return Math.round(total*100)/100;
}
function makeDefaultDose(def){
  const strs=def.strengths||[];
  if(strs.length){
    return {t:'morning',type:'str',s:strs[0],q:1};
  }
  return {t:'morning',type:'free',l:''};
}
function makeDefaultStep(def){
  return {dur:7,unit:'days',ongoing:false,note:'',doses:[makeDefaultDose(def)]};
}

/* ─────────────────────── ADD / REMOVE MEDS ────────────────────────────── */
function addSelectedMed(){
  const key=$('medPicker').value;
  if(!key||!MED_CATALOG[key])return;
  const def=MED_CATALOG[key];
  // Always start with a single empty maintenance step at the lowest strength.
  // The catalogue's example titration plan (if any) can be loaded on demand.
  S.meds.push({
    key:key,
    customName:def.name,
    generic:def.generic,
    class:def.class,
    subclass:def.subclass,
    schedule:def.schedule,
    form:def.form,
    unit:def.unit||'mg',
    strengths:(def.strengths||[]).slice(),
    authority:def.authority||'',
    steps:[Object.assign(makeDefaultStep(def),{ongoing:true})]
  });
  $('medPicker').value='';
  render();
}
function loadExamplePlan(mi){
  const m=S.meds[mi];if(!m)return;
  const def=MED_CATALOG[m.key];
  if(!def||!def.steps||!def.steps.length||!def.steps[0].doses){
    alert('No example titration plan available for this medication yet.');
    return;
  }
  if(!confirm('Replace the current plan with the example titration?'))return;
  m.steps=JSON.parse(JSON.stringify(def.steps));
  render();
}
function removeMed(idx){
  if(!confirm('Remove this medication and its titration plan?'))return;
  S.meds.splice(idx,1);render();
}
function addStepBelow(mi,si){
  const m=S.meds[mi];if(!m)return;
  const src=m.steps[si];
  const copy=src?JSON.parse(JSON.stringify(src.doses)):[makeDefaultDose(m)];
  m.steps.splice(si+1,0,{dur:1,unit:'weeks',ongoing:false,note:'',doses:copy});
  render();
}
function removeStep(mi,si){
  if(S.meds[mi].steps.length<=1){alert('Each medication needs at least one step.');return;}
  S.meds[mi].steps.splice(si,1);render();
}
function setStepDur(mi,si,val){S.meds[mi].steps[si].dur=parseInt(val,10)||1;renderOutputs();}
function setStepUnit(mi,si,val){S.meds[mi].steps[si].unit=val;render();}
function setStepOngoing(mi,si,checked){S.meds[mi].steps[si].ongoing=!!checked;render();}
function setStepNote(mi,si,val){S.meds[mi].steps[si].note=val;renderOutputs();}
function setMedField(mi,field,val){
  S.meds[mi][field]=val;renderOutputs();
  if(field==='customName'){const el=document.querySelector('[data-medname="'+mi+'"]');if(el)el.textContent=val;}
}
function changeDoseQ(mi,si,di,dir){
  const m=S.meds[mi];const dose=m.steps[si].doses[di];if(!dose||dose.type!=='str')return;
  const qSteps=getQSteps(m);
  let idx=qSteps.indexOf(dose.q);if(idx<0)idx=qSteps.indexOf(1);
  const ni=Math.max(0,Math.min(qSteps.length-1,idx+dir));
  dose.q=qSteps[ni];render();
}
function setDoseStrength(mi,si,di,val){
  const dose=S.meds[mi].steps[si].doses[di];if(!dose)return;
  dose.s=parseFloat(val);render();
}
function setDoseTime(mi,si,di,val){S.meds[mi].steps[si].doses[di].t=val;renderOutputs();}
function setDoseFreeLabel(mi,si,di,val){S.meds[mi].steps[si].doses[di].l=val;renderOutputs();}
function togglePRN(mi,si,di){
  const d=S.meds[mi].steps[si].doses[di];d.prn=!d.prn;render();
}
function doseToFree(mi,si,di){
  const m=S.meds[mi];const d=m.steps[si].doses[di];
  d.l=buildDoseLabel(m,d);d.type='free';delete d.q;delete d.s;render();
}
function doseToStr(mi,si,di){
  const m=S.meds[mi];const d=m.steps[si].doses[di];
  const strs=m.strengths||[];
  d.type='str';d.s=strs.length?strs[0]:0;d.q=1;render();
}
function addDoseToStep(mi,si,t){
  if(!t)return;
  const m=S.meds[mi];
  const d=makeDefaultDose(m);d.t=t;
  m.steps[si].doses.push(d);render();
}
function removeDose(mi,si,di){
  if(S.meds[mi].steps[si].doses.length<=1){alert('Each step needs at least one dose row.');return;}
  S.meds[mi].steps[si].doses.splice(di,1);render();
}

function renderMedList(){
  const wrap=$('medList');
  const empty=$('medEmpty');
  if(!S.meds.length){wrap.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  const CLASS_LBL={
    stimulant:'Stimulant', nonstim:'Non-stimulant', antidepressant:'Antidepressant',
    mood_stabiliser:'Mood stabiliser', antipsychotic_oral:'Antipsychotic',
    antipsychotic_lai:'LAI', anxiolytic:'Anxiolytic', gabapentinoid:'Gabapentinoid',
    anticholinergic:'Anticholinergic', cognitive:'Cognitive', aud:'AUD', oud:'OUD',
    metabolic:'Metabolic', anticonvulsant:'Anticonvulsant', parkinson:"Parkinson's",
    analgesic:'Analgesic', other:'Other'
  };
  wrap.innerHTML=S.meds.map((m,i)=>{
    const classLbl=(m.subclass||CLASS_LBL[m.class]||'Other');
    const classCls=m.class||'other';
    const def=MED_CATALOG[m.key]||{};
    const hasExample=def.steps&&def.steps.length&&def.steps[0].doses;

      <div class="med-card">

          </div>

            <button class="btn sm danger" onclick="removeMed(${i})">Remove</button>

          <input value="${esc(m.authority||'')}" oninput="setMedField(${i},'authority',this.value)" style="border:none;background:transparent;width:100%;font:13px var(--sans);color:#475569;padding:2px 0;margin-top:2px">
        </div>
        <div class="med-sub-h">Titration protocol</div>
        <div class="tit-step-list">${steps}</div>
      </div>`;
  }).join('');
}

function renderTitDose(m,d,di,si,mi){
  let ctrl,toggleBtn;
  if(d.type==='str'){
    const u=m.unit||'mg';
    const qSteps=getQSteps(m);
    let qIdx=qSteps.indexOf(d.q);
    if(qIdx<0){let nearest=qSteps[0],bestDiff=Math.abs((d.q||1)-nearest);qSteps.forEach(v=>{const dd=Math.abs((d.q||1)-v);if(dd<bestDiff){bestDiff=dd;nearest=v;}});d.q=nearest;}
    const stepper='<div class="tit-stepper">'+
      `<button type="button" class="tit-ds-btn" onclick="changeDoseQ(${mi},${si},${di},-1)">−</button>`+
      `<span class="tit-ds-lbl">${fmtQ(d.q)}</span>`+
      `<button type="button" class="tit-ds-btn" onclick="changeDoseQ(${mi},${si},${di},1)">+</button>`+
      '</div>';
    const formLbl='<span class="tit-form-lbl">'+esc(formNoun(m,d.q))+'</span>';
    const strs=m.strengths||[];
    let strengthCtrl;
    if(strs.length>1){
      strengthCtrl=`<select class="tit-cap-sel" onchange="setDoseStrength(${mi},${si},${di},this.value)">`+
        strs.map(s=>`<option value="${s}"${d.s==s?' selected':''}>${esc(String(s))}${esc(u)}</option>`).join('')+'</select>';
    } else {
      const fixed=strs[0]||d.s||0;
      strengthCtrl=`<span class="tit-fixed-strength">${esc(String(fixed))}${esc(u)}</span>`;
    }
    ctrl='<div class="tit-dose-ctrl">'+stepper+formLbl+strengthCtrl+'</div>';
    toggleBtn=`<button type="button" class="tit-icon-btn" onclick="doseToFree(${mi},${si},${di})" title="Custom text (ranges, fractions, PRN wording)">✎</button>`;
  } else {
    ctrl=`<input class="tit-dose-free" type="text" value="${esc(d.l||'')}" placeholder="e.g. 0.5–1 tab (2.5–5mg) PRN" oninput="setDoseFreeLabel(${mi},${si},${di},this.value)">`;
    toggleBtn=(m.strengths&&m.strengths.length)?`<button type="button" class="tit-icon-btn" onclick="doseToStr(${mi},${si},${di})" title="Switch back to stepper">↺</button>`:'';
  }
  const prnBtn=`<button type="button" class="tit-prn-btn${d.prn?' on':''}" onclick="togglePRN(${mi},${si},${di})">PRN</button>`;
  const tOpts=TIT_TIMES.map(t=>`<option value="${t}"${(d.t||'morning')===t?' selected':''}>${t}</option>`).join('');
  return '<div class="tit-dose-item">'+
    `<select class="tit-dose-time" onchange="setDoseTime(${mi},${si},${di},this.value)">${tOpts}</select>`+
    ctrl+
    `<div class="tit-dose-actions">${toggleBtn}${prnBtn}<button type="button" class="tit-dose-rm" onclick="removeDose(${mi},${si},${di})">×</button></div>`+
    '</div>';
}

function renderTitStep(m,st,si,mi){
  const isOngoing=!!st.ongoing;
  const doses=st.doses.map((d,di)=>renderTitDose(m,d,di,si,mi)).join('');
  const tOpts='<option value="" disabled selected>+ add timing</option>'+TIT_TIMES.map(t=>`<option value="${t}">${t}</option>`).join('');
  const autoLbl=titAutoLabel(m.steps,si);
  const total=totalDailyDose(m,st);
  return '<div class="tit-step-row">'+
    `<div class="tit-step-line"><div class="tit-step-dot${isOngoing?' ongoing':''}"></div><div class="tit-step-connector"></div></div>`+
    '<div class="tit-step-content">'+
      '<div class="tit-step-header">'+
        `<span class="tit-step-badge${isOngoing?' ongoing':''}">${esc(autoLbl)}</span>`+
        `<input class="tit-dur-inp" type="number" min="1" max="365" value="${isOngoing?'':(st.dur||1)}" ${isOngoing?'disabled':''} oninput="setStepDur(${mi},${si},this.value)">`+
        `<select class="tit-dur-sel" ${isOngoing?'disabled':''} onchange="setStepUnit(${mi},${si},this.value)">`+
          `<option value="days"${st.unit==='days'?' selected':''}>days</option>`+
          `<option value="weeks"${st.unit==='weeks'?' selected':''}>weeks</option>`+
        '</select>'+
        `<label class="tit-ongoing-lbl"><input type="checkbox" ${isOngoing?'checked':''} onchange="setStepOngoing(${mi},${si},this.checked)"> Ongoing</label>`+
        `<button class="tit-rm-step" onclick="removeStep(${mi},${si})" title="Remove step">×</button>`+
      '</div>'+
      `<div class="tit-dose-rows">${doses}</div>`+
      (total>0?`<div class="tit-step-total">Total/day: ${total}${esc(m.unit||'mg')}</div>`:'')+
      '<div class="tit-step-foot">'+
        `<select class="tit-time-sel" onchange="if(this.value){addDoseToStep(${mi},${si},this.value);this.selectedIndex=0;}">${tOpts}</select>`+
        `<button class="tit-add-step" onclick="addStepBelow(${mi},${si})">+ Add step below</button>`+
      '</div>'+
      `<input class="tit-step-note" type="text" value="${esc(st.note||'')}" placeholder="Optional step note (e.g. review BP after week 2)" oninput="setStepNote(${mi},${si},this.value)">`+
    '</div></div>';
}

/* ─────────────────────────── OUTPUTS ──────────────────────────────────── */
function patientHeaderText(){
  const date=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  return {date};
}
/* ─── Output helpers: render a step's dose row as natural sig text ─────── */
function _doseText(m,d){
  const t=d.t||'morning';
  const prn=d.prn?' PRN':'';
  if(d.type==='free')return (d.l||'').trim()+' '+t+prn;
  const lbl=buildDoseLabel(m,d);
  return lbl+' '+t+prn;
}
function _stepDoseSummary(m,st){
  // Combine same-time doses on one line: e.g. "1 tab (10mg) + ½ tab (5mg) morning"
  const byTime={},order=[];
  st.doses.forEach(d=>{
    const t=d.t||'morning';
    if(!byTime[t]){byTime[t]=[];order.push(t);}
    byTime[t].push(d);
  });
  return order.map(t=>{
    const arr=byTime[t];
    const prn=arr.some(d=>d.prn);
    const labels=arr.map(d=>d.type==='free'?(d.l||'').trim():buildDoseLabel(m,d)).filter(Boolean);
    return labels.join(' + ')+' '+t+(prn?' PRN':'');
  }).join('; ');
}

/* ── eScript output (titration protocol only) ──────────────────────────── */
function buildEscript(){
  if(!S.meds.length)return '— Add a medication on the left to generate the titration protocol.';
  let out='';
  S.meds.forEach((m,i)=>{
    const name=(m.customName||m.name).toUpperCase();
    out+=(i+1)+'. '+name+(m.generic?' ('+m.generic+')':'')+'\n';
    m.steps.forEach((st,si)=>{
      const lbl=titAutoLabel(m.steps,si);
      const summary=_stepDoseSummary(m,st)||'(no dose set)';
      const total=totalDailyDose(m,st);
      out+='   '+lbl.padEnd(14)+summary;
      if(total>0)out+='  — total '+total+(m.unit||'mg')+'/day';
      out+='\n';
      if(st.note)out+='   '.padEnd(17)+'• '+st.note+'\n';
    });
    if(m.authority)out+='   Authority: '+m.authority+'\n';
    out+='\n';
  });
  return out.trimEnd();
}

/* ── Letter prose (titration protocol as narrative) ───────────────────── */
function buildLetter(){
  if(!S.meds.length)return '<p class="empty" style="margin:0">Add a medication on the left to generate the letter prose.</p>';
  const h=patientHeaderText();
  const opening='<p><strong>Date:</strong> '+esc(h.date)+'</p>'+
    '<p>The titration plan is as follows.</p>';
  const meds=S.meds.map((m,i)=>{
    const name=(m.customName||m.name);
    const intro='<p><strong>'+esc(name)+'</strong>'+(m.generic?' ('+esc(m.generic)+')':'')+'</p>';
    const stepLines=m.steps.map((st,si)=>{
      const lbl=titAutoLabel(m.steps,si);
      const summary=_stepDoseSummary(m,st);
      const total=totalDailyDose(m,st);
      const note=st.note?' '+esc(st.note).replace(/\.\s*$/,'')+'.':'';
      const totalStr=total>0?' (total '+total+esc(m.unit||'mg')+'/day)':'';
      return '<p><strong>'+esc(lbl)+':</strong> '+(summary?esc(summary):'(no dose set)')+totalStr+'.'+note+'</p>';
    }).join('');
    const auth=m.authority?'<p><em>'+esc(m.authority)+'</em></p>':'';
    return intro+stepLines+auth;
  }).join('<hr style="border:none;border-top:1px solid #e2e8f0;margin:14px 0">');
  const close='<p>'+esc(CLINICIAN_NAME)+'</p>';
  return opening+meds+close;
}

/* ── Table output (titration protocol schedule) ───────────────────────── */
function buildTable(){
  if(!S.meds.length)return '<div class="empty">Add a medication on the left to generate the schedule.</div>';
  const h=patientHeaderText();
  let out='<div style="font:600 13px var(--sans);color:var(--primary);margin-bottom:10px">'+esc(h.date)+' &nbsp;·&nbsp; '+esc(CLINICIAN_NAME)+'</div>';
  out+=S.meds.map((m,i)=>{
    const rows=m.steps.map((st,si)=>{
      const lbl=titAutoLabel(m.steps,si);
      const dur=st.ongoing?'—':(st.dur||1)+' '+(st.unit||'days');
      const summary=_stepDoseSummary(m,st);
      const total=totalDailyDose(m,st);
      return '<tr>'+
        '<td><strong>'+esc(lbl)+'</strong></td>'+
        '<td>'+esc(dur)+'</td>'+
        '<td>'+esc(summary||'(no dose set)')+'</td>'+
        '<td>'+(total>0?total+esc(m.unit||'mg'):'')+'</td>'+
        '<td>'+esc(st.note||'')+'</td>'+
      '</tr>';
    }).join('');
    return '<div style="margin-bottom:18px">'+
      '<div style="font:700 14px var(--sans);color:var(--primary);margin-bottom:4px">'+esc(m.customName||m.name)+(m.generic?' <span style="font-weight:400;color:var(--muted);font-size:12px">— '+esc(m.generic)+'</span>':'')+'</div>'+
      (m.authority?'<div style="font:11.5px var(--sans);color:#475569;background:#fff7ed;border:1px solid #fde68a;padding:6px 10px;border-radius:6px;margin:4px 0 8px">'+esc(m.authority)+'</div>':'')+
      '<table class="schedule">'+
        '<thead><tr><th style="width:18%">Step</th><th style="width:14%">Duration</th><th style="width:40%">Dose</th><th style="width:12%">Total/day</th><th>Notes</th></tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table>'+
    '</div>';
  }).join('');
  return out;
}

function renderOutputs(){
  $('out-escript').innerHTML='<pre class="escript">'+esc(buildEscript())+'</pre>';
  $('out-letter').innerHTML='<div class="letter">'+buildLetter()+'</div>';
  $('out-table').innerHTML=buildTable();
}

/* ────────────────────────── TABS / ACTIONS ────────────────────────────── */
function setTab(name){
  activeTab=name;
  document.querySelectorAll('.out-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.out-pane').forEach(p=>p.classList.toggle('active',p.id==='out-'+name));
}
function copyActive(){
  let txt='';
  if(activeTab==='escript')txt=buildEscript();
  else{
    const el=$('out-'+activeTab);
    txt=el?el.innerText:'';
  }
  // Write rich html + plain
  if(navigator.clipboard&&navigator.clipboard.write&&window.ClipboardItem&&activeTab!=='escript'){
    const html=$('out-'+activeTab).innerHTML;
    try{
      navigator.clipboard.write([new ClipboardItem({
        'text/html':new Blob(['<html><body style="font-family:Arial,sans-serif">'+html+'</body></html>'],{type:'text/html'}),
        'text/plain':new Blob([txt],{type:'text/plain'})
      })]).then(flash).catch(()=>navigator.clipboard.writeText(txt).then(flash));
      return;
    }catch(e){}
  }
  navigator.clipboard.writeText(txt).then(flash);
}
function flash(){
  const btn=document.querySelector('.out-actions .btn');
  if(!btn)return;
  const orig=btn.textContent;btn.textContent='Copied';btn.classList.add('ghost');
  setTimeout(()=>{btn.textContent=orig;},1200);
}
function printActive(){
  const title='Titration plan';
  let body='';
  if(activeTab==='escript')body='<pre style="font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap">'+esc(buildEscript())+'</pre>';
  else if(activeTab==='letter')body='<div style="font:14px/1.6 Georgia,Times,serif">'+buildLetter()+'</div>';
  else body=buildTable();
  const w=window.open('','_blank','width=900,height=900');
  if(!w)return;
  w.document.write('<!DOCTYPE html><html><head><title>'+esc(title)+'</title>'+
    '<style>body{font-family:Arial,sans-serif;color:#111;padding:24px;max-width:780px;margin:0 auto}h1{font-size:16px;margin:0 0 12px;color:#1e3a5f}table{border-collapse:collapse;width:100%;font-size:13px;margin:6px 0 12px}th,td{border:1px solid #cbd5e1;padding:6px 8px;text-align:left;vertical-align:top}th{background:#1e3a5f;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.04em}p{margin:0 0 10px}@media print{body{padding:0}}</style></head><body>'+
    '<h1>Titration plan</h1>'+body+'</body></html>');
  w.document.close();setTimeout(()=>{w.print();},250);
}

/* ─────────────────────────── INIT ─────────────────────────────────────── */
load();
populatePicker();
$('medClassFilter').addEventListener('change',populatePicker);
render();
</script>
