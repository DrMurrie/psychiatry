<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Understanding ADHD — Your Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === TOKENS === */
:root {
  --font-body: 'Inter', sans-serif;
  --font-reading: 'Lora', Georgia, serif;

  --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;   --space-20: 5rem;

  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem;  --radius-xl: 1rem; --radius-2xl: 1.5rem;
  --radius-full: 9999px;
  --transition: 200ms cubic-bezier(0.16, 1, 0.3, 1);

  /* Light mode - warmer, friendlier */
  --bg:             #faf8f4;
  --surface:        #ffffff;
  --surface-2:      #f9f6f2;
  --surface-hover:  #f3f0ec;
  --border:         oklch(0.4 0.01 80 / 0.1);
  --divider:        oklch(0.4 0.01 80 / 0.06);

  --text:           #2a2520;
  --text-muted:     #6e6a64;
  --text-faint:     #b0ada8;
  --text-inverse:   #faf8f4;

  /* Colorful accents for tiles */
  --teal:           #00a19c;
  --teal-bg:        #e6f7f7;
  --purple:         #8b5cf6;
  --purple-bg:      #f3eeff;
  --orange:         #f97316;
  --orange-bg:      #fff4ed;
  --pink:           #ec4899;
  --pink-bg:        #fef1f8;
  --blue:           #3b82f6;
  --blue-bg:        #eff6ff;
  --green:          #10b981;
  --green-bg:       #ecfdf5;
  --yellow:         #f59e0b;
  --yellow-bg:      #fffbeb;
  --indigo:         #6366f1;
  --indigo-bg:      #eef2ff;
  --red:            #ef4444;
  --red-bg:         #fef2f2;
  --emerald:        #059669;
  --emerald-bg:     #d1fae5;

  --shadow-sm: 0 1px 3px oklch(0.2 0.01 80 / 0.08);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.1);
  --shadow-lg: 0 8px 24px oklch(0.2 0.01 80 / 0.14);
  --shadow-hover: 0 8px 24px oklch(0.2 0.01 80 / 0.16);

  --header-h: 60px;
}

[data-theme="dark"] {
  --bg:             #141210;
  --surface:        #1c1a17;
  --surface-2:      #222018;
  --surface-hover:  #2a2720;
  --border:         oklch(0.9 0.01 80 / 0.12);
  --divider:        oklch(0.9 0.01 80 / 0.06);
  --text:           #e6e3de;
  --text-muted:     #9d9990;
  --text-faint:     #5a5850;
  --text-inverse:   #1c1a17;

  --teal:           #14b8a6;
  --teal-bg:        #1a2e2d;
  --purple:         #a78bfa;
  --purple-bg:      #261f3d;
  --orange:         #fb923c;
  --orange-bg:      #2e1e10;
  --pink:           #f472b6;
  --pink-bg:        #331625;
  --blue:           #60a5fa;
  --blue-bg:        #1e293b;
  --green:          #34d399;
  --green-bg:       #1a2e25;
  --yellow:         #fbbf24;
  --yellow-bg:      #2e2410;
  --indigo:         #818cf8;
  --indigo-bg:      #1f2237;
  --red:            #f87171;
  --red-bg:         #2e1818;
  --emerald:        #10b981;
  --emerald-bg:     #1a2e25;

  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.4);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.5);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.6);
  --shadow-hover: 0 12px 32px oklch(0 0 0 / 0.7);
}

/* === BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + var(--space-4)); -webkit-text-size-adjust: none; }
body { font-family: var(--font-body); font-size: var(--text-base); color: var(--text); background: var(--bg); min-height: 100dvh; line-height: 1.6; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: var(--teal); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: oklch(from var(--teal) l c h / 0.2); }
:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; border-radius: var(--radius-sm); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: 0.01ms !important; } }

/* === LAYOUT === */
.app { display: flex; flex-direction: column; min-height: 100dvh; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--space-4);
}
.header-logo {
  display: flex; align-items: center; gap: var(--space-2);
  font-weight: 700; font-size: var(--text-base);
  color: var(--text); text-decoration: none;
}
.header-logo:hover { text-decoration: none; }
.header-logo-icon {
  width: 36px; height: 36px; border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--teal), var(--blue));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 1.1em;
}
.header-title { color: var(--text); }
.header-actions { display: flex; align-items: center; gap: var(--space-2); }
.icon-btn {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition), transform var(--transition);
}
.icon-btn:hover { background: var(--surface-hover); color: var(--text); transform: scale(1.05); }
.icon-btn:active { transform: scale(0.97); }

/* Main */
.main { flex: 1; padding: var(--space-6) var(--space-4) var(--space-20); max-width: 1100px; margin: 0 auto; width: 100%; }
@media (min-width: 768px) { .main { padding: var(--space-10) var(--space-8) var(--space-20); } }

/* === WELCOME PAGE === */
.welcome { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.welcome-hero {
  text-align: center; margin-bottom: var(--space-10);
  padding: var(--space-6) 0;
}
.welcome-hero-icon {
  font-size: 4em; margin-bottom: var(--space-4);
  animation: bounce 2s ease infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.welcome-title {
  font-size: var(--text-xl); font-weight: 800; color: var(--text);
  margin-bottom: var(--space-3); line-height: 1.1;
}
.welcome-subtitle {
  font-size: var(--text-base); color: var(--text-muted);
  max-width: 42ch; margin: 0 auto var(--space-4);
}
.welcome-search {
  max-width: 500px; margin: var(--space-6) auto 0; position: relative;
}
.welcome-search input {
  width: 100%; padding: var(--space-3) var(--space-4) var(--space-3) 44px;
  border: 2px solid var(--border); border-radius: var(--radius-full);
  background: var(--surface); color: var(--text); font-size: var(--text-base);
  transition: border-color var(--transition), box-shadow var(--transition);
}
.welcome-search input:focus {
  outline: none; border-color: var(--teal);
  box-shadow: 0 0 0 4px oklch(from var(--teal) l c h / 0.15);
}
.welcome-search input::placeholder { color: var(--text-faint); }
.welcome-search svg {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none;
}

/* Section categories */
.section-category { margin-bottom: var(--space-10); }
.section-cat-header {
  display: flex; align-items: center; gap: var(--space-2);
  margin-bottom: var(--space-4);
}
.section-cat-icon { font-size: 1.5em; }
.section-cat-title {
  font-size: var(--text-lg); font-weight: 700; color: var(--text);
}

/* Tile grid - ADHD friendly! */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(160px, 100%), 1fr));
  gap: var(--space-3);
}
@media (min-width: 500px) {
  .tile-grid { grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr)); }
}

/* Individual tile */
.tile {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  padding: var(--space-4);
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 140px;
}
.tile::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity var(--transition);
  border-radius: var(--radius-xl);
}
.tile:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-hover);
  border-color: transparent;
}
.tile:hover::before { opacity: 1; }
.tile:active { transform: translateY(-1px) scale(1.0); }

/* Tile color variants */
.tile-teal { border-color: var(--teal); }
.tile-teal::before { background: var(--teal-bg); }
.tile-teal:hover { box-shadow: 0 8px 24px oklch(from var(--teal) l c h / 0.25); }

.tile-purple { border-color: var(--purple); }
.tile-purple::before { background: var(--purple-bg); }
.tile-purple:hover { box-shadow: 0 8px 24px oklch(from var(--purple) l c h / 0.25); }

.tile-orange { border-color: var(--orange); }
.tile-orange::before { background: var(--orange-bg); }
.tile-orange:hover { box-shadow: 0 8px 24px oklch(from var(--orange) l c h / 0.25); }

.tile-pink { border-color: var(--pink); }
.tile-pink::before { background: var(--pink-bg); }
.tile-pink:hover { box-shadow: 0 8px 24px oklch(from var(--pink) l c h / 0.25); }

.tile-blue { border-color: var(--blue); }
.tile-blue::before { background: var(--blue-bg); }
.tile-blue:hover { box-shadow: 0 8px 24px oklch(from var(--blue) l c h / 0.25); }

.tile-green { border-color: var(--green); }
.tile-green::before { background: var(--green-bg); }
.tile-green:hover { box-shadow: 0 8px 24px oklch(from var(--green) l c h / 0.25); }

.tile-yellow { border-color: var(--yellow); }
.tile-yellow::before { background: var(--yellow-bg); }
.tile-yellow:hover { box-shadow: 0 8px 24px oklch(from var(--yellow) l c h / 0.25); }

.tile-indigo { border-color: var(--indigo); }
.tile-indigo::before { background: var(--indigo-bg); }
.tile-indigo:hover { box-shadow: 0 8px 24px oklch(from var(--indigo) l c h / 0.25); }

.tile-red { border-color: var(--red); }
.tile-red::before { background: var(--red-bg); }
.tile-red:hover { box-shadow: 0 8px 24px oklch(from var(--red) l c h / 0.25); }

.tile-emerald { border-color: var(--emerald); }
.tile-emerald::before { background: var(--emerald-bg); }
.tile-emerald:hover { box-shadow: 0 8px 24px oklch(from var(--emerald) l c h / 0.25); }

.tile-emoji {
  font-size: 2.5em; margin-bottom: var(--space-2);
  position: relative; z-index: 1;
  transition: transform var(--transition);
}
.tile:hover .tile-emoji { transform: scale(1.1) rotate(5deg); }
.tile-label {
  font-size: var(--text-sm); font-weight: 600; color: var(--text);
  line-height: 1.3; position: relative; z-index: 1;
}
.tile-hidden { display: none; }

/* === ARTICLE VIEW === */
.article { display: none; animation: fadeIn 0.3s ease; }
.article.active { display: block; }

.back-btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  color: var(--text-muted); font-size: var(--text-sm); font-weight: 500;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-full);
  margin-bottom: var(--space-6);
  transition: background var(--transition), color var(--transition);
}
.back-btn:hover { background: var(--surface-hover); color: var(--text); text-decoration: none; }

.article-header {
  padding-bottom: var(--space-5); margin-bottom: var(--space-6);
  border-bottom: 2px solid var(--border);
}
.article-title {
  font-family: var(--font-reading); font-size: var(--text-xl);
  color: var(--text); line-height: 1.2; margin-bottom: var(--space-4);
}
.article-actions {
  display: flex; gap: var(--space-2); flex-wrap: wrap;
}
.btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4); border-radius: var(--radius-full);
  font-size: var(--text-sm); font-weight: 500;
  transition: all var(--transition);
  min-height: 36px;
}
.btn-ghost { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface-hover); color: var(--text); box-shadow: var(--shadow-sm); }

/* Reading content */
.reading-content {
  font-family: var(--font-reading);
  font-size: clamp(1.05rem, 1rem + 0.25vw, 1.15rem);
  line-height: 1.7;
  color: var(--text);
}
.reading-content .rich-h1 {
  font-family: var(--font-reading); font-size: var(--text-xl);
  font-weight: 600; color: var(--teal); margin: var(--space-8) 0 var(--space-3);
  padding-bottom: var(--space-2); border-bottom: 2px solid var(--teal-bg);
  line-height: 1.2;
}
.reading-content .rich-h1:first-child { margin-top: 0; }
.reading-content .rich-h2 {
  font-family: var(--font-reading); font-size: var(--text-lg);
  font-weight: 600; color: var(--text); margin: var(--space-6) 0 var(--space-2);
}
.reading-content .rich-h3 {
  font-family: var(--font-body); font-size: var(--text-xs);
  font-weight: 700; color: var(--text-muted); margin: var(--space-4) 0 var(--space-2);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.reading-content .rich-p {
  margin-bottom: var(--space-4); max-width: 68ch;
}
.reading-content .rich-ul {
  margin: 0 0 var(--space-5) var(--space-5);
  list-style: none; padding: 0;
}
.reading-content .rich-ul li {
  padding: var(--space-1) 0 var(--space-1) var(--space-5);
  position: relative; max-width: 65ch;
}
.reading-content .rich-ul li::before {
  content: ''; position: absolute; left: 0; top: 0.7em;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal);
}
.reading-content .rich-cite {
  font-family: var(--font-body); font-size: var(--text-xs);
  color: var(--text-faint); font-style: italic; margin-bottom: var(--space-3);
  padding: var(--space-2) var(--space-3);
  background: var(--surface-2); border-radius: var(--radius-md);
  border-left: 3px solid var(--border);
}
.reading-content .rich-warn {
  background: var(--orange-bg); border-left: 3px solid var(--orange);
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  padding: var(--space-3) var(--space-4); margin: var(--space-4) 0;
  color: var(--orange); font-weight: 600; font-family: var(--font-body);
  font-size: var(--text-sm);
}
.reading-content table.rich-tit {
  width: 100%; border-collapse: collapse; margin: var(--space-4) 0;
  font-family: var(--font-body); font-size: var(--text-sm);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden;
}
.reading-content table.rich-tit th {
  background: var(--teal-bg); color: var(--teal);
  padding: var(--space-2) var(--space-3); text-align: left;
  font-weight: 600; font-size: var(--text-xs);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.reading-content table.rich-tit td {
  padding: var(--space-2) var(--space-3);
  border-top: 1px solid var(--border); vertical-align: top;
}
.reading-content table.rich-tit tr:nth-child(even) td { background: var(--surface-2); }
.reading-content strong { font-weight: 600; }
.reading-content em { font-style: italic; }

/* Prev/Next */
.article-footer {
  display: flex; gap: var(--space-3); margin-top: var(--space-10);
  padding-top: var(--space-6); border-top: 2px solid var(--border);
  flex-wrap: wrap;
}
.prev-next-btn {
  flex: 1; min-width: 200px;
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius-lg); font-size: var(--text-sm);
  transition: all var(--transition);
}
.prev-next-btn:hover {
  background: var(--surface-hover); box-shadow: var(--shadow-md);
  border-color: var(--teal); transform: translateY(-2px);
}
.pn-content { flex: 1; }
.pn-label { font-size: var(--text-xs); color: var(--text-faint); display: block; margin-bottom: 2px; }
.pn-title { font-size: var(--text-sm); font-weight: 600; color: var(--text); }

/* Toast */
.toast {
  position: fixed; bottom: var(--space-6); right: var(--space-6);
  background: var(--text); color: var(--bg);
  padding: var(--space-3) var(--space-5); border-radius: var(--radius-full);
  font-size: var(--text-sm); font-weight: 600;
  opacity: 0; transition: opacity var(--transition); pointer-events: none; z-index: 400;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; }

/* Progress indicator */
.progress-bar {
  height: 3px; background: linear-gradient(90deg, var(--teal), var(--blue));
  position: fixed; top: 0; left: 0; z-index: 300;
  transition: width 0.3s ease;
  border-radius: 0 var(--radius-full) var(--radius-full) 0;
}

/* Print */
@media print {
  .header, .back-btn, .article-actions, .article-footer, .progress-bar { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .reading-content { font-size: 11pt; }
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width:0"></div>

<div class="app">
  <header class="header">
    <a href="#" class="header-logo" onclick="showWelcome(); return false;">
      <div class="header-logo-icon">🧠</div>
      <span class="header-title">ADHD Guide</span>
    </a>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" data-theme-toggle title="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" onclick="window.print()" title="Print">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      </button>
    </div>
  </header>

  <main class="main" id="main">
    <!-- Welcome -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-hero">
        <div class="welcome-hero-icon">🧠✨</div>
        <h1 class="welcome-title">Your ADHD Guide</h1>
        <p class="welcome-subtitle">Quick answers. Real strategies. Made for ADHD brains (that's you!)</p>
        <div class="welcome-search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="welcomeSearch" placeholder="Search for anything…" oninput="filterTiles(this.value)">
        </div>
      </div>

      <div id="tileCategories"></div>
    </div>

    <!-- Article -->
    <div class="article" id="articleView">
      <button class="back-btn" onclick="showWelcome()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to topics
      </button>
      <div class="article-header">
        <h1 class="article-title" id="articleTitle"></h1>
        <div class="article-actions">
          <button class="btn btn-ghost" onclick="copyArticle()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy text
          </button>
        </div>
      </div>
      <div class="reading-content" id="articleContent"></div>
      <div class="article-footer" id="articleFooter"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>

    s_what: `<div class="rich-h1">What Is ADHD?</div>
<p class="rich-p">ADHD is not about attention — not really. It is about <em>regulation</em>. The ADHD brain has a fundamentally different way of managing effort, attention, emotion, and time. It is not a deficit of the ability to pay attention; it is a deficit of the ability to <strong>control</strong> which things get attention, for how long, and when.</p>
<p class="rich-p">Think of it as a brain that runs on interest, urgency, and novelty rather than importance or intention. When something captures genuine interest, the ADHD brain can focus intensely — sometimes for hours. When something is dull, routine, or not immediately rewarding, starting it can feel genuinely impossible despite knowing it matters. This is not a choice. The brain's activation system simply does not fire in the same way.</p>
<p class="rich-p">ADHD is a neurodevelopmental condition — present from early in life, with a strong genetic basis, and reflecting real, measurable differences in brain structure, chemistry, and connectivity. It is not caused by bad parenting, too much screen time, diet, or a lack of willpower. It is one of the most heritable conditions in medicine.</p>
<p class="rich-p">It affects around 5% of children and 3–4% of adults worldwide. It presents differently across people: some are externally hyperactive and impulsive, others are internally restless and quietly overwhelmed. Many people — particularly women — go unrecognised until adulthood because their presentation did not match the stereotype. Late diagnosis is common, and the relief that comes with it is real.</p>
<p class="rich-p">ADHD is also very treatable. With the right support, outcomes across every major life domain — work, relationships, health, and wellbeing — improve substantially.</p>`,
    s_brain: `<div class="rich-h1">What Is Happening in the Brain</div>
<p class="rich-p">The part of the brain most involved in ADHD is the <strong>prefrontal cortex</strong> — the region behind your forehead responsible for planning, organising, prioritising, starting tasks, holding information in mind, and regulating emotion and impulse. In ADHD, this region is underactive and less well-connected to the rest of the brain.</p>
<p class="rich-p">Two neurotransmitters are at the centre of this: <strong>dopamine</strong> and <strong>noradrenaline</strong>.</p>
<div class="rich-h2">Dopamine — the "why bother" signal</div>
<p class="rich-p">Dopamine's primary job is to signal that something is <em>worth the effort</em> — it drives motivation, initiates action, and makes the brain feel like a task will be rewarding enough to start. In ADHD, this signal in the prefrontal circuits is weaker and less consistent. This is why tasks that are intellectually straightforward can feel genuinely impossible to begin — not because the person lacks ability or desire, but because the brain's effort-activation system is not firing. It also explains hyperfocus: when something is genuinely novel or stimulating, dopamine fires normally and the person can concentrate extraordinarily well. The problem is <em>regulation</em>, not capacity.</p>
<div class="rich-h2">Noradrenaline — the "stay locked in" signal</div>
<p class="rich-p">Noradrenaline controls the brain's signal-to-noise ratio — it sharpens the relevant signal and suppresses background noise. It allows the prefrontal cortex to stay focused on a task despite distractions, and to hold a train of thought without losing it. In ADHD, reduced noradrenaline means the brain is more easily pulled off-task, thoughts are harder to hold, and irrelevant stimuli compete with whatever you are trying to do. It also drives emotional reactivity — emotions arrive louder and are harder to regulate because the prefrontal dampening system is underactive.</p>
<div class="rich-h2">What this looks like day to day</div>
<ul class="rich-ul">
<li class="rich-li"><strong>Starting tasks:</strong> Low dopamine = the activation cost feels enormous, even for simple things</li>
<li class="rich-li"><strong>Losing the thread mid-task:</strong> Low noradrenaline = the signal drops and something else captures attention</li>
<li class="rich-li"><strong>Working memory gaps:</strong> Forgetting why you walked into a room; losing a thought mid-sentence</li>
<li class="rich-li"><strong>Emotional intensity:</strong> Feelings arrive fast and hard because the prefrontal cortex is not adequately dampening the limbic response</li>
<li class="rich-li"><strong>Impulsivity:</strong> The "wait, think first" brake is slower and weaker</li>
<li class="rich-li"><strong>Time blindness:</strong> The prefrontal cortex manages time perception — when underactive, time feels abstract and deadlines feel unreal until imminent</li>
</ul>
<p class="rich-p">ADHD medication works by increasing the availability of dopamine and noradrenaline in the prefrontal cortex. When it works well, people describe it not as feeling medicated, but as finally having access to the version of themselves they always knew was there.</p>`,

    s_down: `<div class="rich-h1">What Else Does ADHD Cause?</div>
<p class="rich-p">The diagnostic criteria cover attention, hyperactivity, and impulsivity — but for many people the most disabling features of ADHD are not on that list.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Emotional dysregulation:</strong> Emotions arrive faster and more intensely, and the prefrontal braking system that would normally modulate them is less effective. Frustration, excitement, rejection, and disappointment all hit harder. This is neurological, not a personality flaw.</li>
<li class="rich-li"><strong>Rejection sensitive dysphoria (RSD):</strong> Intense, sometimes overwhelming emotional pain triggered by perceived rejection, criticism, or failure — even when mild or imagined. RSD can dominate relationships, cause avoidance of challenge, and be mistaken for anxiety or depression. Extremely common in ADHD and rarely discussed.</li>
<li class="rich-li"><strong>Time blindness:</strong> ADHD impairs the brain's internal sense of time. People with ADHD often experience time as two states — "now" and "not now." Deadlines days away feel unreal. This produces chronic lateness, last-minute rushes, and inaccurate time estimation — not disrespect or laziness.</li>
<li class="rich-li"><strong>Working memory deficits:</strong> The mental notepad used to hold information while using it is impaired — causing mid-sentence thought loss, forgetting what you walked into a room for, and needing to re-read the same paragraph repeatedly.</li>
<li class="rich-li"><strong>Executive dysfunction:</strong> Planning, organising, prioritising, initiating, switching tasks, managing time — the whole suite of self-management is impaired. People can know exactly what they need to do and still be unable to make themselves start.</li>
<li class="rich-li"><strong>Hyperfocus:</strong> The same dysregulation that causes inattention can flip to tunnel-vision absorption — hours pass unnoticed at the expense of everything else. Same system, different direction.</li>
<li class="rich-li"><strong>Sleep problems:</strong> Delayed sleep phase, difficulty switching off at night, and unrefreshing sleep are significantly more common in ADHD. The brain that cannot disengage from stimulation during the day struggles to disengage at night.</li>
<li class="rich-li"><strong>Appetite dysregulation:</strong> Irregular eating, forgetting to eat, reactive or emotional eating, and higher rates of binge eating disorder — driven by impulsivity and reward dysregulation.</li>
<li class="rich-li"><strong>Anxiety:</strong> Very commonly co-occurs with ADHD — sometimes as a separate condition, often as a downstream consequence of years of struggling without understanding why.</li>
<li class="rich-li"><strong>Low frustration tolerance:</strong> Difficulty tolerating delay, obstacles, repetition, or perceived unfairness — a downstream effect of poor dopamine regulation, not immaturity.</li>
<li class="rich-li"><strong>Chronic underachievement:</strong> A persistent gap between capacity and output — intellectually capable but unable to perform consistently or sustain effort on long-horizon goals.</li>
<li class="rich-li"><strong>Substance use risk:</strong> Higher rates of alcohol and substance use disorders in unmanaged ADHD, driven by impulsivity and self-medication of symptoms.</li>
<li class="rich-li"><strong>Relationship difficulties:</strong> Forgetting important things, interrupting, inconsistency, emotional intensity, and difficulty with routine or reciprocity create strain — not from indifference, but from ADHD itself.</li>
</ul>`,
    s_impact: `<div class="rich-h1">The Real-World Impact</div>
<p class="rich-p">Untreated ADHD is not a mild inconvenience. The functional consequences are significant across multiple life domains:</p>

<li class="rich-li"><strong>Driving:</strong> Untreated ADHD significantly increases crash risk. Newly licensed drivers with ADHD are 36–62% more likely to crash, and treated individuals show substantially lower accident rates.</li>
<li class="rich-li"><strong>Relationships:</strong> Divorce rates in couples affected by ADHD are approximately twice that of the general population.</li>

    s_meds_dex: `<div class="rich-h1">Dexamphetamine (Immediate Release)</div>
<div class="rich-h2">How It Works</div>
<p class="rich-p">Dexamphetamine is a stimulant. It increases dopamine and noradrenaline in the prefrontal cortex — the two chemicals your brain needs more of for focus and impulse control. It both blocks the recycling of these chemicals and triggers extra release, which is why it tends to have a slightly stronger effect than methylphenidate-based medications (Ritalin, Concerta).</p>

<div class="rich-h2">Practical Details</div>
<ul class="rich-ul">
<li class="rich-li"><strong>Form:</strong> Short-acting tablet (IR). Effects begin within 30–45 minutes, last 4–6 hours.</li>
<li class="rich-li"><strong>Dosing:</strong> Usually taken 2–3 times daily. Afternoon dose timing matters — too late can delay sleep onset.</li>
<li class="rich-li"><strong>Food:</strong> Avoid acidic drinks (fruit juice, soft drink) at the same time. Taking after food reduces nausea.</li>
</ul>

<div class="rich-h2">What to Expect</div>
<p class="rich-p">Most people notice improved ability to start and sustain tasks, quieter internal restlessness, and better impulse control. Appetite suppression is common, especially at lunchtime. Rebound (a drop in mood or focus as the medication wears off) can occur with short-acting formulations.</p>

<div class="rich-h2">Side Effects: Dexamphetamine</div>
<p class="rich-p">Most are dose-dependent and settle within 1–2 weeks. If they do not, the dose may need adjusting.</p>

<p class="rich-p"><strong>Common</strong></p>
<ul class="rich-ul">

    s_meds_vyvanse: `<div class="rich-h1">Vyvanse (Lisdexamfetamine)</div>

    s_meds_ritalinIR: `<div class="rich-h1">Medication: Ritalin IR / Artige</div>
<div class="rich-h2">How It Works</div>
<p class="rich-p">Ritalin IR and Artige are brand names for immediate-release methylphenidate. Ritalin (methylphenidate IR) works by blocking the dopamine and noradrenaline transporter proteins — like putting a stopper in the vacuum cleaner that normally clears these signals. The result is increased availability of dopamine and noradrenaline in the prefrontal cortex, improving focus and impulse control. Unlike dexamphetamine, it does not directly trigger dopamine release; the mechanism is purely reuptake inhibition, which generally means a milder effect profile.</p>
<div class="rich-h2">Practical Details</div>

</ul>

<p class="rich-p">Ritalin IR tends to have a slightly milder side effect profile than dexamphetamine — less appetite suppression and fewer cardiovascular effects on average. The short duration means some people need a top-up dose in the afternoon. Rebound on wearing off is possible.</p>

    s_meds_ritalinLA: `<div class="rich-h1">Medication: Ritalin LA</div>

    s_meds_concerta: `<div class="rich-h1">Medication: Concerta</div>
<div class="rich-h2">How It Works</div>
<p class="rich-p">Concerta (methylphenidate extended-release) uses the OROS (osmotic pump) delivery system: 22% of the dose is delivered immediately, and the remaining 78% is released gradually over 10-12 hours as water enters the osmotic pump. This creates a slowly ascending blood level across the day, mimicking the natural demand curve of the school or work day. The mechanism is the same as other methylphenidate medications — reuptake inhibition of dopamine and noradrenaline.</p>
<div class="rich-h2">Practical Details</div>
<ul class="rich-ul">
  <li><strong>Form:</strong> Tablet. Must be swallowed whole — do not crush or chew. The empty shell may appear in the stool; this is normal.</li>
  <li><strong>Duration:</strong> 10-12 hours from one morning dose.</li>
  <li><strong>With or without food:</strong> Food does not significantly affect delivery. Avoid acidic drinks at the same time.</li>
</ul>
<div class="rich-h2">What to Expect</div>
<p class="rich-p">Concerta is a good once-daily option. The ascending delivery profile means the medication builds gradually rather than producing an early peak. Some people prefer this; others prefer the quicker onset of other formulations. The extended duration suits people who need coverage into the afternoon and evening.</p>

<p class="rich-p">Concerta's osmotic pump delivery creates a slowly ascending blood level across the day, which tends to produce a smooth effect with a manageable side effect profile. The shell of the tablet may appear in the stool — this is normal and does not mean the medication hasn't worked.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Reduced appetite</li>
  <li>Insomnia — given the 10-12 hour duration, take in the morning</li>
  <li>Headache</li>
  <li>Increased heart rate</li>
  <li>Dry mouth</li>
</ul>
<div class="rich-h2">Less common</div>
<ul class="rich-ul">
  <li>Elevated blood pressure</li>
  <li>Irritability as medication wears off in the evening</li>
  <li>In people with bipolar disorder, stimulants can occasionally trigger mania</li>
</ul>
<div class="rich-h2">Important</div>
<ul class="rich-ul">
  <li>Must be swallowed whole — the OROS pump mechanism requires the tablet to remain intact. Do not crush or chew.</li>
</ul>
<div class="rich-h2">Food and drug interactions</div>
<ul class="rich-ul">
  <li>Acidic drinks reduce absorption</li>
  <li>MAOIs: absolute contraindication</li>
</ul>`,

    s_meds_strattera: `<div class="rich-h1">Medication: Strattera</div>
<div class="rich-h2">How It Works</div>
<p class="rich-p">Strattera (atomoxetine) is not a stimulant. It is a selective noradrenaline reuptake inhibitor (SNRI) — it blocks the noradrenaline transporter, which in the prefrontal cortex also increases synaptic dopamine (because the noradrenaline transporter there handles both). It has no abuse potential and is not a controlled substance. The mechanism means it works differently to stimulants and is particularly useful when stimulants are not appropriate, not tolerated, or insufficient on their own.</p>
<div class="rich-h2">Practical Details</div>
<ul class="rich-ul">
  <li><strong>Onset:</strong> Unlike stimulants, atomoxetine takes 4-12 weeks for full therapeutic effect. Some response may appear in 2-4 weeks, but the full benefit often takes longer.</li>
  <li><strong>Dosing:</strong> Once or twice daily. Dose is typically titrated up slowly over several weeks.</li>
  <li><strong>Duration:</strong> 24-hour coverage when at therapeutic dose.</li>
  <li><strong>Important interaction:</strong> Avoid with fluoxetine (Prozac), paroxetine (Aropax), or bupropion — these can dramatically increase atomoxetine blood levels and side effects.</li>
</ul>
<div class="rich-h2">What to Expect</div>
<p class="rich-p">Strattera improves attention, impulse control, and emotional regulation, but the onset is slow. Initial side effects (nausea, fatigue) often settle within the first few weeks. It is a good option for people with anxiety, tic disorders, or a history of substance use, or as an add-on to stimulants.</p>

<p class="rich-p">Atomoxetine's side effects differ from stimulants — it does not affect dopamine directly, so there is no rebound or appetite suppression in the same way. However, it has its own profile to be aware of.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Nausea or stomach discomfort — taking with food reduces this significantly</li>
  <li>Dry mouth</li>
  <li>Constipation</li>
  <li>Dizziness</li>
  <li>Mood changes — some people notice increased anxiety or irritability during the titration phase</li>
  <li>Urinary hesitancy</li>
  <li>Reduced appetite — milder than with stimulants</li>
  <li>Insomnia in some, sedation in others</li>
</ul>
<div class="rich-h2">Rare but important</div>
<ul class="rich-ul">
  <li>Liver injury (rare): if you develop yellowing of the skin or eyes, dark urine, or persistent abdominal pain, stop the medication and seek medical attention promptly</li>
  <li>Priapism (prolonged, painful erection): rare but documented — seek emergency treatment if it occurs</li>
</ul>
<div class="rich-h2">Drug interactions</div>
<ul class="rich-ul">
  <li>Fluoxetine (Prozac), paroxetine (Aropax), or bupropion: dramatically increase atomoxetine blood levels — inform your prescriber of all medications</li>
  <li>Salbutamol (Ventolin): may increase cardiovascular effects when combined</li>
</ul>`,

    s_meds_intuniv: `<div class="rich-h1">Medication: Intuniv</div>
<div class="rich-h2">How It Works</div>
<p class="rich-p">Intuniv (guanfacine extended-release) is a non-stimulant that works on alpha-2A adrenergic receptors in the prefrontal cortex. Activating these receptors strengthens the connections between prefrontal neurons that control attention and impulse regulation — essentially improving the signal quality in circuits that ADHD disrupts. It does not affect dopamine directly and has no abuse potential.</p>
<div class="rich-h2">Practical Details</div>
<ul class="rich-ul">
  <li><strong>Dosing:</strong> Once daily, titrated slowly upward over weeks.</li>
  <li><strong>Onset:</strong> Gradual — therapeutic effect develops over 4-8 weeks of dose titration.</li>
  <li><strong>Do not stop suddenly:</strong> Stopping guanfacine abruptly can cause rebound hypertension and tachycardia. Always taper the dose under medical guidance.</li>
  <li><strong>Timing:</strong> Take at the same time each day. Avoid high-fat meals as they increase absorption and can increase side effects.</li>
</ul>
<div class="rich-h2">What to Expect</div>
<p class="rich-p">Guanfacine is particularly helpful for emotional dysregulation, impulsivity, and hyperactivity. It is often used in combination with stimulants. Sedation is the most common side effect, especially in the first few weeks — this usually settles. Low blood pressure and slow heart rate are also common.</p>

<p class="rich-p">Guanfacine acts on blood pressure pathways as well as ADHD circuits, so its side effects reflect both actions. Most settle after the first few weeks at a stable dose.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Drowsiness and sedation — especially in the first weeks. This often improves with time. Taking the dose in the evening can help.</li>
  <li>Low blood pressure — can cause dizziness, especially when standing up quickly</li>
  <li>Slow heart rate (bradycardia)</li>
  <li>Headache</li>
  <li>Dry mouth</li>
  <li>Constipation</li>
  <li>Stomach discomfort</li>
</ul>
<div class="rich-h2">Critical: do not stop suddenly</div>
<p class="rich-p">Stopping guanfacine abruptly can cause a rebound rise in blood pressure and heart rate. Always taper the dose gradually under your doctor's guidance. Do not run out without a plan.</p>
<div class="rich-h2">Drug interactions</div>
<ul class="rich-ul">
  <li>Other blood pressure medications: effects can add up — ensure all your doctors know you are on guanfacine</li>
  <li>Avoid high-fat meals at the time of dose — they increase absorption and can worsen side effects</li>
</ul>`,

    s_meds_catapres: `<div class="rich-h1">Medication: Catapres</div>
<div class="rich-h2">How It Works</div>
<p class="rich-p">Catapres (clonidine) is a non-stimulant that acts on alpha-2 adrenergic receptors in the brain and peripheral nervous system. In ADHD, it helps regulate arousal, reduce impulsivity, and improve sleep-onset — the latter makes it particularly useful when taken in the evening. Like guanfacine, it has no abuse potential, but it has a broader pharmacological profile and requires careful management.</p>
<div class="rich-h2">Practical Details</div>
<ul class="rich-ul">
  <li><strong>Dosing:</strong> Titrated slowly. Your psychiatrist will specify your exact dose and schedule.</li>
  <li><strong>Do not stop suddenly:</strong> Stopping clonidine abruptly can cause a rebound rise in blood pressure and heart rate. Always taper the dose under medical guidance.</li>
  <li><strong>Alcohol:</strong> Significantly increases sedation. Avoid or strictly limit alcohol while taking clonidine.</li>
  <li><strong>Blood pressure medications:</strong> Effects can add up — let all your doctors know you are taking clonidine.</li>
</ul>
<div class="rich-h2">What to Expect</div>
<p class="rich-p">Clonidine is useful for managing hyperarousal, impulsivity, and sleep difficulties associated with ADHD. Sedation is common, especially at first. Low blood pressure and dizziness (particularly on standing) are also common. These effects often diminish after the first few weeks at a stable dose.</p>

<p class="rich-p">Clonidine has a broader pharmacological profile than guanfacine and requires careful management. Side effects often diminish after the first few weeks at a stable dose.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Sedation — can be significant, especially when starting or after dose increases</li>
  <li>Dizziness, particularly on standing</li>
  <li>Low blood pressure</li>
  <li>Slow heart rate</li>
  <li>Dry mouth</li>
  <li>Constipation</li>
  <li>Headache</li>
  <li>Low mood or fatigue in some people</li>
  <li>Erectile dysfunction</li>
</ul>
<div class="rich-h2">Critical: do not stop suddenly</div>
<p class="rich-p">Stopping clonidine abruptly can cause a rebound rise in blood pressure and heart rate. Always taper the dose gradually under your doctor's guidance.</p>
<div class="rich-h2">Drug interactions</div>
<ul class="rich-ul">
  <li>Alcohol significantly increases sedation — avoid or strictly limit alcohol while taking clonidine</li>
  <li>Other blood pressure medications: effects can add up — ensure all your doctors know you are on clonidine</li>
</ul>`,

    s_monitor: `<div class="rich-h1">What to Monitor During Titration</div>
<div class="rich-h2">Positive Effects to Track</div>
<ul class="rich-ul">
  <li>Focus and concentration — is it easier to start and stay on tasks?</li>
  <li>Internal restlessness — is the background agitation quieter?</li>
  <li>Impulse control — more pause before reacting?</li>
  <li>Mood and anxiety — is the baseline anxiety lower?</li>
  <li>Energy and motivation — easier to get going?</li>
  <li>Productivity — completing more of what you intend to each day?</li>
</ul>
<div class="rich-h2">Side Effects to Track</div>
<ul class="rich-ul">
  <li>Appetite — eating less, losing weight?</li>
  <li>Sleep — harder to fall asleep or waking earlier?</li>
  <li>Heart rate / chest — any palpitations or chest discomfort?</li>
  <li>Blood pressure — check regularly if any cardiovascular history</li>
  <li>Mood — any increase in anxiety, irritability, or flatness?</li>
  <li>Headaches or nausea — particularly in first two weeks</li>
  <li>Rebound — mood crash in late afternoon or evening?</li>
</ul>
<div class="rich-h2">When to Pause Titration</div>
<ul class="rich-ul">
  <li class="rich-warn">Heart rate persistently above 100 bpm at rest, or chest pain, palpitations, or shortness of breath</li>
  <li class="rich-warn">Blood pressure consistently elevated above 140/90</li>
  <li class="rich-warn">Significant increase in anxiety or panic that is not settling</li>
  <li class="rich-warn">New or worsening psychotic symptoms — unusual thoughts, paranoia, perceptual disturbances</li>
  <li class="rich-warn">Marked mood elevation, unusually high energy, or reduced need for sleep</li>
  <li class="rich-warn">Significant insomnia not resolved by adjusting timing</li>
  <li class="rich-warn">Severe appetite suppression with noticeable weight loss</li>
  <li class="rich-warn">Emotional blunting at the current dose — reduce dose, do not increase</li>
</ul>`,

    s_safety: `<div class="rich-h1">Important Safety Considerations</div>
<div class="rich-h2">When to Stop and Seek Urgent Help</div>
<p class="rich-p rich-warn">Stop the medication and contact your doctor or emergency services immediately if you experience chest pain, irregular heartbeat, signs of hypertensive crisis (severe headache, visual changes, confusion), or any psychotic symptoms.</p>
<div class="rich-h2">Cannabis</div>
<p class="rich-p">Cannabis and stimulant medications are a genuinely poor combination. Cannabis impairs working memory, attentional control, and executive function — the exact same systems ADHD medication is trying to support. Regular cannabis use significantly reduces treatment effectiveness and can worsen ADHD symptoms. There is also increased cardiovascular stress with the combination.</p>
<div class="rich-h2">Alcohol</div>
<p class="rich-p">Stimulants can mask the sedating effects of alcohol, increasing the risk of drinking significantly more than intended. There is also increased cardiovascular load. Warrants awareness and restraint.</p>
<div class="rich-h2">Drug Interactions</div>
<ul class="rich-ul">
  <li><strong class="rich-warn">MAOIs: absolute contraindication.</strong> Do not combine under any circumstances.</li>
  <li><strong>Other stimulants / sympathomimetics:</strong> combining with other stimulant drugs significantly increases cardiovascular risk.</li>
  <li><strong>Decongestants (pseudoephedrine):</strong> avoid combining without medical advice.</li>
  <li><strong>Antidepressants:</strong> most SSRIs and SNRIs are compatible. Do not add or change other medications without disclosing to your psychiatrist.</li>
</ul>
<div class="rich-h2">Do Not Share Your Medication</div>
<p class="rich-p">Stimulant medications are controlled substances in Australia. Sharing them is illegal, places the recipient at risk, and can affect your ability to continue receiving treatment.</p>
<div class="rich-h2">Pregnancy and Breastfeeding</div>
<p class="rich-p">If you are pregnant, planning to become pregnant, or breastfeeding, speak with your psychiatrist before starting or continuing stimulant medication.</p>`,

    s_myths: `<div class="rich-h1">Common Myths About ADHD</div>
<div class="rich-h2">"Stimulants are addictive"</div>
<p class="rich-p">This is probably the most common concern people have, and the evidence does not support it. Prescribed stimulant medication taken orally at therapeutic doses does not cause addiction. In fact, research consistently shows that treating ADHD with medication <em>reduces</em> the risk of developing substance use problems, not the other way around.</p>
<div class="rich-h2">"If the medication works, that proves you have ADHD"</div>
<p class="rich-p">Stimulants increase dopamine and noradrenaline in everyone's brain. The difference is that without ADHD, you tend to just get side effects — increased heart rate, anxiety, reduced appetite — without much cognitive benefit.</p>
<div class="rich-h2">"Everyone feels like this — it's just normal"</div>
<p class="rich-p">Everyone gets distracted sometimes, everybody fidgets on occasion, and everybody finds it harder to concentrate on boring things than interesting things. ADHD is not about occasional symptoms. It is about a consistent, pervasive, pattern of symptoms, that are more than the average prson, that have been present since childhood, and affects multiple areas of life. The brain differences in ADHD are measurable on neuroimaging. It is a real, well-documented condition. ADHD is talked a lot on social media, but that doesn't mean everybody has it. Approximately 90-95% of people don't have ADHD. The benefits that come from understanding the diagnosis plus treatment, can be lifechanging.</p>
<div class="rich-h2">"ADHD only affects children"</div>
<p class="rich-p">ADHD continues into adulthood in around 60% of cases. In adults it often looks different — less obvious hyperactivity, more internal restlessness, chronic underperformance, and difficulty with organisation and follow-through. Many intelligent adults make it through school with ADHD that was unnoticed; they usually struggled, worked extra hard, were powered by anxiety/perfectionism, played loads of sport to manage the hyperactivity, stayed up late to finish assignments at the last minute, or relied upon the structure of school and home life to keep them going. Then in adulthood, many of these coping mechanisms stop working, become damaging, or the structures that kept everything in place were no longer there. </p>
<div class="rich-h2">"People with ADHD just need to try harder"</div>
<p class="rich-p">People with ADHD are often trying extremely hard already. The problem is not effort — it is a brain that does not regulate attention and motivation the same way other brains do. Telling someone with ADHD to try harder is like telling someone with poor eyesight to look harder. The answer is the right tool, not more willpower.</p>
<div class="rich-h2">"ADHD is made up"</div>
<p class="rich-p">ADHD is one of the most researched psychiatric conditions we have. It has consistent genetic findings, reproducible neuroimaging differences, and decades of clinical trial data. There are clear differences in the lives of people with ADHD versus those without it. The treatment response is better for ADHD than many other psychiatric conditions. People with ADHD live longer and have greater quality of life with treatment.</p>
<div class="rich-h2">"You don't really need such a thorough assessment"</div>
<p class="rich-p">There's a reason that only a small number of experienced medical professionals can diagnose ADHD and legally prescribe treatment. Severe depression, psychosis, acute mania, obsessive-compulsive disorder, iron deficiency, delirium, phaochromocytoma, are just some conditions that can easily look like ADHD on the outside, but are actually driven by something else. Missing these would mean that, in the worse case scenario, the symptoms get significantly worse requiring urgent medical attention. In the best case scenario the ADHD specific treatment simply wouldn't work as the actual underlying condition would still be unrecognised and untreated. When you pay to see a psychiatrist, you are paying for the years of medical experience that they have in being able to quickly recognise all these conditions and know what to do about it.  </p>
<div class="rich-h2">"ADHD is overdiagnosed and everyone's on stimulants"</div>
<p class="rich-p">There's no way of knowing if ADHD is overdiagnosed because we don't keep track of everybody with a diagnosis; that would be a massive invasion of privacy. Regarding treatment, it is estimated that up to 5% of Australians have ADHD. However the data shows that only 2.2% of Australians are prescribed stimulant medication. This means that less than half of the expected number of people are accessing the most effective treatment. It may be that not enough people are able to access specialist assessment and treatment. It could also mean that those with a diagnosis either aren't able to have stimulant treamtent, are trying a non-stimulant medication, or with to use non-pharmacological methods to manage. While the rate of stimulant prescribing has increased, it doesn't mean that it's 'everywhere' as such. Keep in mind that the medication 'Vyvanse' is indicated for treatment of binge-eating disorder, and dexamfetamine is used in sleep disorders like narcolepsy; there are other uses for stimulants than just ADHD.</p>
<div class="rich-h2">"You can't have ADHD if you can focus on things you enjoy"</div>
<p class="rich-p">This is a very common misconception. The ADHD brain does not have a focus problem across the board — it has a <em>regulation</em> problem. When something is interesting, novel, or urgent, the brain can hyperfocus intensely. When something is dull or feels low-stakes, focus evaporates. It's not like people with ADHD want this to be the way! Most people with ADHD wish that they could just do normal things; or they wish they didn't do other things. They wish they could remember to pay their bills, or be able to sit still, or not interrupt people all the time (just to name three examples). But it seems like it takes extraordinary effort to overcome these obsticles.</p>`,

    s_faq: `<div class="rich-h1">Commonly Asked Questions</div>
<div class="rich-h2">How quickly will I notice a difference?</div>
<p class="rich-p">With stimulants, sometimes you don't feel any difference with the first doses, but this is just to acclimatise your body to the medication. As the dose goes up, the effect is usually experienced on the same day soon after taking the stimulant. People can usually feel a clear difference before and after taking a dose. That is one of the distinguishing features of ADHD medication. That said, finding the right doses takes time. Non-stimulants typically take longer for the effect to occur, but they can be very beneficial (with patience!). </p>
<div class="rich-h2">Do I have to take it every day?</div>
<p class="rich-p">Generally, yes — the recommendation is to take your medication every day. ADHD does not take weekends off, and consistency helps with titration and makes it easier to track how the medication is working. That said, some people choose to reduce or skip stimulants on weekends or during periods of intense physical exercise. This is an individual decision to discuss with your psychiatrist.</p>
<div class="rich-h2">Will I need to take it forever?</div>
<p class="rich-p">ADHD is typically a lifelong condition, but over time the brain continues to make adaptations - even as an adult. Most adults find that they prefer continuing to take the medication lifelong because many of the symptoms return if they stop. Others find that after sufficient time on the medication they may choose to stop because they develop better coping strategies, they set their life up to accommodate themselves better, or there is a medical reason for stopping.</p>
<div class="rich-h2">Will it change my personality?</div>
<p class="rich-p">No. Stimulants at therapeutic doses should make you feel more like yourself — more able to follow through on what you actually want to do and less restless. If it makes you feel flat or robotic, the dose is probably too high. That is a signal to adjust. Some people find that the optimal dose is one where they have improvements in focus and hyperactivity, but still keep a degree of 'ADHD energy' especially if they're working in a fast moving work environment.</p>
<div class="rich-h2">Is it safe long-term?</div>
<p class="rich-p">Yes. Stimulants have been used clinically since the 1930s and so there is good long term safety data. The main considerations are cardiovascular — blood pressure and heart rate — which your GP will monitor regularly.</p>
<div class="rich-h2">Can I drink alcohol on it?</div>
<p class="rich-p">It is not a great combination. Stimulants can mask the sedating effects of alcohol, thus increasing the risk of drinking more than intended, and leading to a false sense of sobriety. Drinking alcohol puts strain on the liver and the heart when combined with stimulants. It doesn't mean that you cannot drink alcohol at all while taking stimulants. However, any decision around this needs to be sensible, weighing the risks and benefits. It would be worth discussing this with your psychiatrist or GP on how to manage this. </p>
<div class="rich-h2">What if it does not work or I cannot tolerate it?</div>
<p class="rich-p">If one stimulant class does not work, we may try a different one. If stimulants are not tolerated or not suitable, non-stimulant options — atomoxetine, clonidine, and guanfacine — are effective alternatives for the right patient.</p>
<div class="rich-h2">Can I drive while on it?</div>
<p class="rich-p">Yes. ADHD medication does not restrict you from driving. In fact, evidence shows lower crash rates in people with ADHD when they are on medication compared to when they are not. There are no  restrictions on driving in Australia for people taking ADHD medications as prescribed.</p>
<div class="rich-h2">What happens if I miss a dose?</div>
<p class="rich-p">For stimulants, take it as soon as you remember, provided it is not too late in the day. If it is past afternoon, going into evening, skip the missed dose and continue normally the next morning. Do not double up. For atomoxetine or guanfacine, take the medication as soon as you remember and do not double up. Missing one of these may lead to withdrawal side effects.</p>`,

    s_supports: `<div class="rich-h1">Accessing Supports &amp; Services</div>
<p class="rich-p">Being diagnosed with ADHD opens up access to supports and services that may not have been available to you before. These are not charity — they are structured, evidence-based resources designed for people in exactly your situation.</p>
<div class="rich-h2">Medicare-Funded Psychology</div>
<p class="rich-p">Under a Mental Health Treatment Plan from your GP, you can access up to 10 individual psychology sessions per calendar year at a Medicare rebate. This can be used for ADHD-focused Cognitive Behavioural Therapy (CBT), skills coaching, or support for comorbid anxiety or depression. Ask your GP to refer you to a psychologist with ADHD experience.</p>
<div class="rich-h2">Disability Support at Work or Study</div>
<p class="rich-p">If you are in employment or tertiary education, you have the right to request reasonable adjustments. At university and TAFE, disability services can provide extended time for exams, assignment extensions, and alternative assessment formats. In the workplace, reasonable adjustments are covered under the Disability Discrimination Act 1992 — your employer cannot legally discriminate based on a disability that is being appropriately managed. You do not have to disclose your specific diagnosis — you can request adjustments based on your functional needs.</p>
<div class="rich-h2">Peer Support and Community</div>
<ul class="rich-ul">
  <li><strong>ADHD Australia:</strong> <a href="https://www.adhdaustralia.org.au" target="_blank">adhdaustralia.org.au</a> — peer support groups, webinars, and community forums</li>
  <li><strong>ADHD Support Australia:</strong> online community and resources for adults and families</li>
  <li><strong>Beyond Blue:</strong> for comorbid anxiety and depression support — <a href="https://www.beyondblue.org.au" target="_blank">beyondblue.org.au</a></li>
</ul>`,

    s_workplace: `<div class="rich-h1">Workplace Adjustments</div>
<p class="rich-p">Most people with ADHD are highly capable — often creative, energetic, and able to hyperfocus on work they find meaningful. The challenge is that standard workplace environments are often poorly matched to how ADHD brains work. Targeted adjustments can make a significant difference without asking for much.</p>
<div class="rich-h2">Disclosing Your Diagnosis</div>
<p class="rich-p">You are not legally required to disclose your ADHD diagnosis to your employer. Under the Disability Discrimination Act 1992 and Fair Work Act 2009, you can request reasonable adjustments without revealing the underlying diagnosis — framing requests around functional needs (e.g. "I work better with written instructions") is often sufficient and avoids stigma risk.</p>
<p class="rich-p">If you do choose to disclose, do so in writing and frame it constructively: what ADHD means for how you work best, and what specific adjustments would help. Disclosing can improve access to formal accommodations and reduce the risk of performance management for ADHD-related difficulties. Speak with HR or a trusted manager. Your employer is legally required to keep health information confidential and to consider reasonable adjustments before taking disciplinary action on performance.</p>
<div class="rich-h2">What You May Wish to Request</div>
<ul class="rich-ul">
<li class="rich-li"><strong>Written instructions and meeting agendas in advance</strong> — reduces working memory load significantly</li>
<li class="rich-li"><strong>Quiet workspace or noise-cancelling headphones</strong> — reduces distraction from background noise</li>
<li class="rich-li"><strong>Flexible start times</strong> — particularly useful if medication timing affects your peak performance window</li>
<li class="rich-li"><strong>Chunked deadlines</strong> — smaller milestones rather than one final due date</li>
<li class="rich-li"><strong>Work from home on focused-work days</strong> — removes commute and uncontrolled office noise</li>
<li class="rich-li"><strong>Regular brief check-ins with a manager</strong> — short, frequent feedback loops work better than infrequent long reviews</li>
</ul>
<div class="rich-h2">If You Are Self-Employed</div>
<p class="rich-p">Self-employment can suit ADHD very well — autonomy, variety, and passion-driven work tend to activate the ADHD brain effectively. The challenges are the unsexy parts: admin, invoicing, consistent scheduling, and sustained work on low-interest tasks. Practical strategies: batch all admin into a single weekly block, use automated invoicing software, build a consistent daily start <em>routine</em> (not start time — the same sequence of actions that signals to your brain that work is beginning), and build in external accountability through a coach, colleague, or accountability partner. Without external structure, you will need to engineer it deliberately.</p>`,

    s_grief: `<div class="rich-h1">Grief After Late Diagnosis</div>
<p class="rich-p">A late ADHD diagnosis usually brings two things in sequence: relief, then anger — or grief. Relief because a lifetime of difficulties finally has an explanation. Grief because that explanation arrived so late.</p>
<p class="rich-p">The academic struggles, the jobs that fell apart, the relationships damaged by inconsistency or emotional reactivity, the years spent believing you were lazy or less capable — those were ADHD. Not character defects. Not choices. A neurological condition that went unrecognised, often for decades.</p>
<p class="rich-p">That grief is legitimate and does not need to be rushed past or reframed away. What helps is recognising that the past cannot be relitigated, but the future is now being approached with accurate information and proper support — and that is not a small thing.</p>
<p class="rich-p">ADHD is treatable at any age. There is no window that has closed. Late diagnosis also frequently recontextualises family history — many people recognise ADHD in a parent, sibling, or child after their own diagnosis, which can usefully reframe years of difficult relationship dynamics.</p>
<p class="rich-p">If grief after diagnosis feels persistent or significant, it is worth exploring with a psychologist or therapist with ADHD experience. It is a real and common presentation, and it responds well to treatment.</p>`,

    s_pregnant: `<div class="rich-h1">Pregnancy, Breastfeeding, and ADHD Medication</div>
<p class="rich-p">Managing ADHD during pregnancy and breastfeeding requires careful thought. This is an individual decision made together with your psychiatrist, weighing the risks of continuing medication against the risks of untreated ADHD during this period.</p>
<div class="rich-h2">Stimulant medications (dexamphetamine, lisdexamfetamine, methylphenidate)</div>
<p class="rich-p">Current evidence suggests stimulants carry a small increased risk of certain pregnancy complications, including slightly elevated rates of preterm birth and low birth weight. There is no strong evidence of major structural abnormalities, but data is limited. The standard approach is to discuss stopping or reducing stimulants during pregnancy, particularly in the first trimester, unless the risks of untreated ADHD are considered significant.</p>
<p class="rich-p">Untreated ADHD in pregnancy carries its own risks: difficulty attending appointments consistently, higher rates of stress and anxiety, impaired self-care, and difficulties with planning for a new baby. These are real considerations that factor into the decision.</p>
<div class="rich-h2">Non-stimulant options</div>
<ul class="rich-ul">
  <li><strong>Atomoxetine (Strattera):</strong> Not recommended in pregnancy — limited data, some animal studies suggest risk. Generally stopped.</li>
  <li><strong>Guanfacine (Intuniv):</strong> Very limited data. Generally stopped in pregnancy.</li>
  <li><strong>Clonidine (Catapres):</strong> Limited data. Generally stopped.</li>
</ul>
<div class="rich-h2">Breastfeeding</div>
<p class="rich-p">Small amounts of stimulant medication pass into breast milk. The clinical significance in most cases is low, but this needs to be weighed individually. Discuss with your psychiatrist and GP. If you choose to restart medication while breastfeeding, monitoring the infant for reduced feeding or irritability is appropriate.</p>
<div class="rich-h2">Practical steps</div>
<ul class="rich-ul">
  <li>Discuss your plans early — before or as soon as you know you are pregnant</li>
  <li>A medication review with your psychiatrist and obstetrician is recommended</li>
  <li>Non-pharmacological strategies (CBT, coaching, structure) become particularly important during this period</li>
  <li>If you are stopping stimulants, planning a gradual taper with your psychiatrist is preferable to stopping suddenly</li>
</ul>
<p class="rich-p">There is no single right answer. The goal is an informed, personalised plan that manages both the risks of the condition and the risks of treatment.</p>`,

    s_newparent: `<div class="rich-h1">New Parents and ADHD</div>
<p class="rich-p">The transition to parenthood is demanding for anyone. For people with ADHD, it introduces a sustained period of sleep deprivation, unpredictability, and high cognitive load — all of which hit the executive function system hard. This is not a character failing; it is a predictable collision between the demands of new parenthood and the specific vulnerabilities of ADHD.</p>
<div class="rich-h2">What makes it harder with ADHD</div>
<ul class="rich-ul">
  <li><strong>Sleep deprivation compounds ADHD:</strong> The executive function deficits of ADHD are made significantly worse by sleep loss. Worsened attention, emotional reactivity, and impulse control are common.</li>
  <li><strong>Routine disruption:</strong> ADHD management depends heavily on structure and routine — which newborns reliably destroy. Finding a minimal workable routine early matters.</li>
  <li><strong>Medication decisions:</strong> If you paused medication during pregnancy or breastfeeding, discuss the timing of restarting with your psychiatrist — the postnatal period may be when you need it most.</li>
  <li><strong>Partner strain:</strong> ADHD-related forgetfulness, disorganisation, and emotional dysregulation can create significant tension with a partner who is also exhausted. Name this explicitly between you rather than letting resentment build.</li>
  <li><strong>Postnatal mood:</strong> Postnatal depression and anxiety are more common in people with ADHD. If you are struggling significantly with mood in the weeks after birth, raise this with your GP or psychiatrist promptly — it is treatable.</li>
</ul>
<div class="rich-h2">What helps</div>
<ul class="rich-ul">
  <li><strong>Ask for and accept help:</strong> The ADHD tendency to avoid asking for help is particularly costly in this period. Identify one or two specific ways people in your life can practically assist — a meal, a few hours of baby cover, grocery delivery — and ask directly.</li>
  <li><strong>Minimum viable routine:</strong> A small number of fixed daily anchors (morning feed time, a nap window, a rough bedtime) provides enough structure to work within without requiring rigid scheduling.</li>
  <li><strong>Rest when you can, not when you should:</strong> ADHD makes it hard to sleep when you ‘should’ (when the baby sleeps). If you can’t sleep, at least rest without screens. Sleep debt compounds ADHD significantly.</li>
  <li><strong>Repair quickly:</strong> ADHD parents lose patience — this will happen. A genuine, quick repair with your partner or older children matters more than maintaining an appearance of calm. Repair is a parenting skill.</li>
  <li><strong>Lower the bar deliberately:</strong> The standard for ‘good enough’ parenting in the first months is much lower than many people hold themselves to. Feeding, safety, and warmth are the job. Everything else is optional.</li>
</ul>`,

    s_bfrb: `<div class="rich-h1">Body-Focused Repetitive Behaviours (BFRBs) and ADHD</div>
<p class="rich-p">Body-focused repetitive behaviours (BFRBs) include skin picking (excoriation), hair pulling (trichotillomania), nail biting, cheek chewing, and similar repetitive self-directed behaviours. They are significantly more common in people with ADHD than in the general population, and are frequently not recognised or discussed.</p>
<div class="rich-h2">Why BFRBs and ADHD overlap</div>
<ul class="rich-ul">
  <li><strong>Stimulation-seeking:</strong> The ADHD brain’s drive for stimulation means repetitive tactile behaviours can serve as a way of self-regulating arousal and focus. The behaviour often happens automatically while concentrating on something else.</li>
  <li><strong>Impulsivity:</strong> The gap between urge and action is shorter in ADHD, making it harder to pause and redirect BFRB impulses before they become automatic.</li>
  <li><strong>Emotional regulation:</strong> BFRBs often intensify during periods of stress, anxiety, boredom, or emotional discomfort — all situations where the ADHD brain seeks regulation.</li>
  <li><strong>Habit loops:</strong> Over time the behaviour becomes deeply automatic and occurs with little conscious awareness, making it hard to stop even when the person wants to.</li>
</ul>
<div class="rich-h2">These are not ‘just habits’</div>
<p class="rich-p">BFRBs are recognised in the DSM-5 as obsessive-compulsive and related disorders. They can cause significant distress, physical damage (hair loss, skin wounds, scarring), shame, and social avoidance. If BFRBs are affecting your quality of life, it is worth raising with your psychiatrist — they are treatable.</p>
<div class="rich-h2">What helps</div>
<ul class="rich-ul">
  <li><strong>Habit Reversal Training (HRT):</strong> The most evidence-based psychological treatment. A therapist helps you identify triggers and physical cues, then trains a competing response — a different physical action performed instead of the BFRB when the urge arises.</li>
  <li><strong>The Comprehensive Behavioural Treatment (ComB) model:</strong> A broader approach that categorises the sensory, cognitive, affective, motor, and environmental triggers for each person’s BFRB and targets them specifically. More tailored than standard HRT.</li>
  <li><strong>Awareness training:</strong> Many people with ADHD are unaware they are doing it. Ask a trusted person like a spouse or parent to tell you every time you do it. Promise them you won't get mad at them when they identify it! It can sometimes be very surprising how often you do these things without knowing it.</li>
  <li><strong>Barrier strategies:</strong> Bandaids or Pimple Patches on commonly picked sites, wearing gloves while driving or studying (search for Solbari driving gloves), keeping nails very short — physical barriers that increase friction before the urge becomes action.</li>
  <li><strong>Fidget substitutes:</strong> Providing an alternative tactile stimulus — a textured fidget toy, worry stone, or sensory ring — can redirect the stimulation-seeking without harm.</li>
  <li><strong>ADHD treatment itself:</strong> Treating the underlying ADHD often reduces BFRB frequency, particularly when impulsivity and emotional dysregulation improve.</li>
  <li><strong>N-acetylcysteine (NAC):</strong> An over-the-counter supplement with emerging evidence for reducing compulsive behaviours including trichotillomania and skin picking. Discuss with your psychiatrist. Available at Bulk Nutrients online in capsule form.</li>
</ul>
<p class="rich-p">Finding a psychologist experienced in BFRBs (look for HRT or CBT-based BFRB treatment) is the most effective first step for moderate-to-severe presentations.</p>`,

    s_nonpharm_cbt: `<div class="rich-h1">Psychological Therapies for ADHD</div>
<p class="rich-p">Medication is the most effective single treatment for ADHD, but psychological therapies address something medication alone does not: the habits, thought patterns, and skills gaps that accumulate over a lifetime of unmanaged ADHD. These approaches work best alongside medication — medication opens the window, therapy helps you climb through it and stay there.</p>
<div class="rich-h2">CBT — Cognitive Behavioural Therapy</div>
<p class="rich-p"><strong>Evidence: Strong.</strong> Best for: time management, procrastination, organisation, negative self-beliefs. ~60–70% of participants show meaningful functional gains.</p>
<p class="rich-p">ADHD-focused CBT targets functional impairments directly: structured planning, breaking tasks into steps, identifying avoidance patterns, and challenging all-or-nothing thinking. Skills-based and practical, not primarily insight-based.</p>
<div class="rich-h2">ACT — Acceptance and Commitment Therapy</div>
<p class="rich-p"><strong>Evidence: Moderate to strong.</strong> Best for: self-criticism, avoidance, psychological flexibility, values-based action.</p>
<p class="rich-p">ACT teaches psychological flexibility: noticing thoughts without being dominated by them, connecting to personal values as a behavioural guide, and accepting discomfort as part of meaningful action. Key techniques include <em>defusion</em> ("I notice I'm having the thought that I'm useless" instead of "I am useless"), <em>values clarification</em>, and <em>committed action</em> planning. For those who have exhausted themselves trying harder to control their mind, ACT offers a fundamentally different approach.</p>
<div class="rich-h2">DBT Skills Training</div>
<p class="rich-p"><strong>Evidence: Moderate to strong</strong> — especially for emotional dysregulation and rejection sensitivity.</p>
<p class="rich-p">DBT's four skill modules map directly onto ADHD's most impairing features: mindfulness, distress tolerance, emotion regulation, and interpersonal effectiveness. Can be done as standalone skills training without the full DBT programme.</p>
<div class="rich-h2">Mindfulness-Based Interventions (MBSR / MBCT)</div>
<p class="rich-p"><strong>Evidence: Moderate.</strong> Best for: attentional control, emotional reactivity, meta-awareness. Gains require consistent practice over weeks to months.</p>
<p class="rich-p">Mindfulness trains the skill of noticing when attention has wandered and redirecting it — precisely what ADHD makes difficult. Apps such as Waking Up or Insight Timer are effective starting points.</p>
<div class="rich-h2">ADHD Coaching</div>
<p class="rich-p"><strong>Evidence: Moderate.</strong> Practical and present-focused — not therapy. Best for: goal attainment, accountability, routine-building.</p>
<p class="rich-p">A coach works on specific life challenges: building routines, managing time, completing projects. Best suited to people who are functionally stable but need structured accountability. Look for ICF-accredited coaches with specific ADHD training or affiliated with ADHD Australia.</p>
<div class="rich-h2">Occupational Therapy</div>
<p class="rich-p"><strong>Evidence: Emerging.</strong> Best for: daily living skills, environmental modification, workplace function. May be fundable through NDIS.</p>
<p class="rich-p">An OT with ADHD experience can implement hands-on solutions: workspace organisation, routine scaffolding, sensory strategies, and assistive technology. Particularly valuable for those who need individualised practical support.</p>
<div class="rich-h2">Neuromodulation (tDCS / TMS)</div>
<p class="rich-p"><strong>Evidence: Emerging.</strong> Modest effect sizes; protocols not yet standardised. May be worth considering in refractory cases or as an adjunct. Not a first-line recommendation.</p>
<div class="rich-h2">Neurofeedback</div>
<p class="rich-p"><strong>Evidence: Fair (contested).</strong> Real-time EEG-guided brain training. Some trials show benefit; effects difficult to replicate when blinded. Time-intensive and expensive. Not recommended as a primary treatment.</p>`,
