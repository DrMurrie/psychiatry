    s_sh_braindump: `<p class="rich-p">These are not generic productivity tips. Each one addresses a specific mechanism of ADHD. Try one or two at a time rather than implementing everything at once.</p>
<div class="rich-h2">Brain Dump + Priority Matrix</div>
<p class="rich-p">The ADHD brain cannot efficiently hold multiple open loops in working memory. Too many unresolved items create a persistent background anxiety and make it impossible to start any single thing. The fix: get everything out of your head and onto a list — not a to-do list, a <em>brain dump</em>. Everything, regardless of size or urgency. Once it is out, sort it:</p>
<table class="rich-table">
  <thead><tr><th></th><th>Urgent</th><th>Not urgent</th></tr></thead>
  <tbody>
    <tr><td><strong>Important</strong></td><td>Do it today</td><td>Schedule it</td></tr>
    <tr><td><strong>Not important</strong></td><td>Delegate or batch</td><td>Drop it or do it last</td></tr>
  </tbody>
</table>
<p class="rich-p">Do this weekly, or whenever your mental load feels unmanageable. Externalising your task list is itself calming — you are offloading to a trusted system instead of trying to hold everything in RAM.</p>`,

    s_sh_phone: `<div class="rich-h2">Reducing Phone and Social Media Use</div>
<p class="rich-p">Smartphones are engineered to capture attention. For ADHD brains the goal is not willpower — it is <strong>friction</strong>: making undesirable habits physically harder to start.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Hidden folders:</strong> Move Instagram, TikTok, and other high-dopamine apps into a folder within a folder on a back page. The extra taps break the automatic reflex and prevent a surprising amount of mindless scrolling.</li>
<li class="rich-li"><strong>Grayscale mode:</strong> Settings → Accessibility → Display &amp; Text Size → Colour Filters → Greyscale. Colour is a significant part of what makes apps visually rewarding. Grayscale makes your phone boring. It works.</li>
<li class="rich-li"><strong>Screen Time limits:</strong> Settings → Screen Time. Set daily limits per app. Have someone else set the passcode if you tend to override it impulsively.</li>
<li class="rich-li"><strong>Brick:</strong> A physical NFC card (brickself.com) that locks specific apps for a set period when you tap it. Unlike software-only blockers, it cannot easily be circumvented on impulse. Genuinely effective for focus blocks.</li>
<li class="rich-li"><strong>Apple Watch with cellular:</strong> Leave your phone in another room during work blocks. A cellular Apple Watch (GPS + Cellular model) lets you receive calls and urgent messages without having a pocket-sized dopamine dispenser within reach. Physical separation is one of the most effective strategies available.</li>
<li class="rich-li"><strong>Notification audit:</strong> Turn off all non-essential notifications. Every interruption costs not just the distraction time but 10–20 minutes of reorientation to get back to deep work.</li>
<li class="rich-li"><strong>Charge your phone outside the bedroom:</strong> Eliminates late-night scrolling and the morning phone-grab that hijacks the first 30 minutes of your day before medication has kicked in.</li>
</ul>`,

    s_sh_timeblock: `<div class="rich-h2">Time Blocking and Visual Timers</div>
<p class="rich-p">ADHD impairs time perception — "I have time" and "I am running out of time" can feel identical until a deadline is imminent. The solution is to make time <strong>visible</strong>.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Time blocking:</strong> Allocate specific tasks to specific time slots in a calendar — not just a to-do list. A to-do list tells you <em>what</em>. A calendar tells you <em>when</em>. Protect deep work blocks like appointments and build in buffer time.</li>
<li class="rich-li"><strong>The Time Timer:</strong> A visual countdown timer that shows time as a shrinking red disc — making the passage of time concrete rather than abstract. Available as an app or physical device. <a href="https://www.thetherapystore.com.au/product-cat/time-management/" target="_blank">Physical Time Timers available at The Therapy Store Australia</a>.</li>
<li class="rich-li"><strong>The Pomodoro Technique:</strong> Work for 25 minutes, then a 5-minute break. After four rounds, take a longer break. The short sprint structure matches the ADHD attention window and makes starting feel low-stakes.</li>
<li class="rich-li"><strong>Time estimates × 2:</strong> Whatever you think something will take, double it. ADHD consistently produces optimistic time estimates.</li>
</ul>`,

    s_sh_bodydouble: `<div class="rich-h2">Body Doubling</div>
<p class="rich-p">Body doubling is the practice of working in the presence of another person — physically or via video — without necessarily collaborating. Many people with ADHD can initiate and sustain tasks dramatically better when someone else is simply present. Even a silent video call where both people work on separate tasks produces the effect.</p>
<ul class="rich-ul">
<li class="rich-li">Work in a library, café, or co-working space rather than alone at home</li>
<li class="rich-li">Arrange "accountability calls" — each person states what they are working on, then checks back in 30–60 minutes</li>
<li class="rich-li"><strong>Focusmate</strong> (focusmate.com) — free online body doubling community; book 50-minute sessions with a stranger, state your goal at the start, check in at the end</li>
<li class="rich-li">Brain.fm or lofi playlists can simulate the background-presence effect when working alone</li>
</ul>`,

    s_sh_reward: `<div class="rich-h2">Reward Pairing for Aversive Tasks</div>
<p class="rich-p">The ADHD brain is under-stimulated by low-interest tasks. The trick is not to force motivation — it is to pair the aversive task with something that adds stimulation without replacing the task.</p>
<ul class="rich-ul">
  <li>Listen to music, podcasts, or audiobooks only while doing routine household tasks (cleaning, cooking, folding). This makes the task feel different and makes the audio reward contingent on the activity.</li>
  <li>Work in a preferred environment — the coffee shop effect is real. A novel, mildly stimulating environment can sustain engagement longer than a familiar, quiet one for ADHD brains.</li>
  <li>Use a specific playlist only for focused work. Over time, the music becomes a cue that activates the "working" state.</li>
  <li>Set a small, concrete reward for completing a defined block of work — not "when I finish this project" (too remote) but "after I write this section, I will make a coffee." Concrete and proximate rewards activate the dopamine system more reliably than distant ones.</li>
</ul>`,

    s_sh_ifthen: `<div class="rich-h2">If-Then Planning</div>
<p class="rich-p">The ADHD brain struggles with initiating tasks — not because of laziness, but because the automatic link between "it is time to start" and actually starting is weaker. If-then planning (implementation intentions) builds that link explicitly.</p>
<div class="rich-h3">How to use it</div>
<p class="rich-p">Format: <strong>If [situation], then I will [action].</strong></p>
<ul class="rich-ul">
  <li>"If it is 9am and I sit at my desk, then I will open the document I need to work on first."</li>
  <li>"If I finish eating dinner, then I will put my medication out for tomorrow morning immediately."</li>
  <li>"If my phone buzzes while I am working, then I will place it face-down and return to what I was doing before checking it."</li>
</ul>
<p class="rich-p">The more specific the if-then, the more effective. Vague intentions ("I will try to start earlier") do not work for ADHD brains. Concrete, situation-specific triggers do. Write them down and place them somewhere visible.</p>`,

    s_sh_decisions: `<div class="rich-h2">Managing Decision Fatigue</div>
<p class="rich-p">Every decision draws on the same executive function pool that ADHD already taxes. Reducing decision volume preserves mental energy for what matters.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Automate recurring decisions:</strong> Weekly meal structure, similar clothes, default answers to common requests. "I don't schedule meetings before 10am" removes that negotiation every time.</li>
<li class="rich-li"><strong>Batch similar decisions:</strong> Standing shopping list updated throughout the week rather than deciding at the time of purchase.</li>
<li class="rich-li"><strong>Pre-commit with rules:</strong> "If I haven't used it in 12 months, I donate it." Rules made in advance don't require executive function at decision time.</li>
<li class="rich-li"><strong>Protect your best hours:</strong> Do cognitively demanding work during peak medication effect. Reserve lower-stakes decisions for later when executive function has depleted.</li>
</ul>
<div class="rich-h2">Improving Your Ability to Study</div>
<p class="rich-p">Standard study advice was written for neurotypical brains. ADHD requires techniques that work with the interest-driven attention system rather than against it.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Close open loops first:</strong> Do a quick brain dump before starting. Unresolved items compete for attention in working memory. Getting them out of your head clears the mental workspace.</li>
<li class="rich-li"><strong>Active recall, not re-reading:</strong> Re-reading creates almost no lasting memory in ADHD. Read a section, close it, write down everything you remember, then check. Flashcards with spaced repetition (Anki) are ideal — the quiz format provides the mild novelty-reward that activates the ADHD dopamine system.</li>
<li class="rich-li"><strong>The Feynman Technique:</strong> Explain the concept out loud as if teaching someone who knows nothing about it. When you get stuck, you have found the exact gap. Go back, fill it, and explain again. Forces genuine understanding rather than recognition-level familiarity.</li>
<li class="rich-li"><strong>Loop studying:</strong> Instead of working linearly from start to finish, work in loops — cover the whole topic at a surface level first, then go around again in more depth, then again. Each pass deepens understanding without losing the overall map. Interruptions are also less catastrophic — you are never deep in a single thread that gets lost.</li>
<li class="rich-li"><strong>Body doubling for study:</strong> Study in a library, café, or on Focusmate. The presence of others significantly improves initiation and sustained effort.</li>
<li class="rich-li"><strong>Short sprints with hard stops:</strong> 25-minute Pomodoros with genuine breaks. Set a timer and commit to stopping when it ends. Makes starting feel low-stakes ("it's only 25 minutes") and prevents burnout.</li>
<li class="rich-li"><strong>Interest bridging:</strong> If the material is genuinely uninteresting, find an angle that connects it to something you care about. ADHD brains learn through interest — the connection does not need to be logical, just genuine.</li>
<li class="rich-li"><strong>Eliminate decision friction before studying:</strong> Lay out everything you need the night before. Pre-decide exactly what you are studying (not "chemistry" but "chapter 4, questions 1–20"). The activation cost in ADHD is highest at the point of starting — reduce decisions required at that moment to near zero.</li>
<li class="rich-li"><strong>Study during medication peak:</strong> Schedule demanding cognitive work 60–90 minutes after taking stimulant medication. Do not save studying for evening when medication has worn off.</li>
<li class="rich-li"><strong>Record and replay:</strong> Record yourself summarising material out loud, then listen back during low-focus activities (walking, commuting). Multimodal input improves retention in ADHD.</li>
</ul>`,

    s_sh_bingeeating: `<div class="rich-h2">Binge Eating and ADHD</div>
<p class="rich-p">Binge eating is significantly more common in ADHD and is not simply about willpower or food. The ADHD brain seeks dopamine, and food — particularly highly palatable, calorie-dense food — provides a reliable and immediate dopamine hit. Impulsivity reduces the pause between urge and action. Inattention means meals are skipped or irregular, driving hunger that accelerates loss of control. Understanding this helps remove shame and directs effort toward what actually works.</p>
<div class="rich-h3">What helps</div>
<ul class="rich-ul">
  <li><strong>Eat regularly:</strong> Skipping meals (especially when ADHD medication suppresses appetite at lunch) leads to significant hunger later, which makes eating regulation much harder. A small, scheduled lunch — even when not very hungry — reduces evening overconsumption.</li>
  <li><strong>Reduce friction for regular eating, increase friction for bingeing:</strong> Keep easy, adequate food accessible; make high-stimulation binge foods harder to reach (don't buy them, store them out of sight, require preparation).</li>
  <li><strong>Identify the emotional trigger:</strong> Binge urges often follow boredom, procrastination, frustration, or overwhelm in ADHD — not just physical hunger. Noticing "I am not hungry, I am avoiding something" is the first step to choosing a different response.</li>
  <li><strong>Address the dopamine need directly:</strong> If binge eating is serving as a dopamine source, other dopamine-generating activities (movement, music, a brief engaging task) can reduce the urge without the eating.</li>
  <li><strong>If binge eating is significantly impacting your life:</strong> This is worth raising with your psychiatrist. Medication changes and/or psychological support (particularly CBT-E or DBT) have good evidence.</li>
</ul>`,

    s_sh_emotional: `<div class="rich-h2">Managing Emotional Dysregulation</div>
<p class="rich-p">Emotional dysregulation in ADHD is neurological — the same prefrontal circuits that manage attention also regulate emotional responses. Emotions arrive faster, feel more intense, and take longer to settle. These skills are adapted from DBT, ACT, and neuroscience-informed approaches.</p>
<div class="rich-h3">In the moment — when already activated</div>
<ul class="rich-ul">
<li class="rich-li"><strong>TIPP (DBT):</strong> <em>Temperature</em> — cold water on face or wrists activates the dive reflex and rapidly lowers heart rate. <em>Intense exercise</em> — 60 seconds of jumping jacks burns off physiological activation. <em>Paced breathing</em> — exhale longer than inhale (4 in, 7 out) activates the parasympathetic system. <em>Progressive muscle relaxation</em> — tense and release major muscle groups in sequence.</li>
<li class="rich-li"><strong>STOP skill (DBT):</strong> <em>S</em>top. <em>T</em>ake a step back physically if possible. <em>O</em>bserve what you are feeling without acting on it. <em>P</em>roceed mindfully. Even 30 seconds before responding changes outcomes.</li>
<li class="rich-li"><strong>Cold water face immersion:</strong> Submerge your face in cold water for 15–30 seconds. Activates the mammalian dive reflex, rapidly reducing heart rate and emotional intensity. It sounds unusual; it works reliably.</li>
</ul>
<div class="rich-h3">Building longer-term regulation</div>
<ul class="rich-ul">
<li class="rich-li"><strong>PLEASE skills (DBT):</strong> Emotional regulation is dramatically worse when your physical baseline is poor. <em>PL</em>ease treat physical illness. <em>E</em>at regularly. <em>A</em>void mood-altering substances. <em>S</em>leep adequately. <em>E</em>xercise daily. Prerequisites for emotional regulation in ADHD, not optional lifestyle tips.</li>
<li class="rich-li"><strong>Opposite Action (DBT):</strong> When an emotion is prompting an action that will make things worse, do the opposite. Shame says withdraw — opposite action is to reach out. Anger says attack — opposite action is to approach gently. The emotion changes when the behaviour changes.</li>
<li class="rich-li"><strong>Defusion (ACT):</strong> Create distance from intense thoughts. Instead of "I am worthless," try "I notice I am having the thought that I am worthless." The feeling is still there, but you are no longer fused with it.</li>
<li class="rich-li"><strong>Emotion naming:</strong> Accurately labelling what you are feeling — not just "bad" but "I feel rejected and ashamed" — activates the prefrontal cortex and reduces amygdala reactivity. Solid neuroimaging evidence supports this.</li>
<li class="rich-li"><strong>The 90-second rule:</strong> The physiological component of an emotional response lasts approximately 90 seconds if you do not feed it with rumination. Ride out the wave without acting on it and it will naturally begin to subside.</li>
<li class="rich-li"><strong>Map your RSD triggers in advance:</strong> Identify the situations that reliably activate rejection sensitivity — certain types of feedback, ambiguous messages, specific relationships. Knowing the trigger in advance lets you apply skills before you are already flooded.</li>
</ul>`,

    s_sh_exercise: `<div class="rich-h2">Exercise and ADHD</div>
<p class="rich-p">Exercise is one of the most robustly evidence-based non-pharmacological interventions for ADHD. A single bout of aerobic exercise produces an immediate, measurable improvement in attention, working memory, and impulse control for 1-4 hours afterwards — comparable in magnitude to a low dose of stimulant medication. Regular exercise also improves baseline executive function, sleep quality, emotional regulation, and mood over time.</p>
<div class="rich-h3">What the evidence supports</div>
<ul class="rich-ul">
  <li><strong>Aerobic exercise is the most studied:</strong> Running, cycling, swimming, rowing — anything that elevates heart rate for 20 minutes or more. The acute cognitive benefit appears with as little as 20 minutes.</li>
  <li><strong>Timing matters:</strong> Exercise in the morning or before cognitively demanding tasks maximises the acute benefit. Some people find evening exercise delays sleep; others don't — pay attention to your own response.</li>
  <li><strong>Consistency matters more than intensity:</strong> Three moderate sessions per week has better evidence for ADHD-specific benefits than occasional intense sessions.</li>
  <li><strong>Novelty helps adherence:</strong> ADHD brains disengage from routine. Varying activities, training with others, joining a team, or using competitive elements (running apps, challenges) tends to sustain engagement better than the same routine every day.</li>
</ul>
<div class="rich-h3">Getting started when motivation is low</div>
<p class="rich-p">The ADHD brain finds initiation hardest. Commit to the smallest viable version: 10 minutes walking. Pair it with something enjoyable (podcast, playlist). Keep your shoes by the door. Make it as easy to start as possible — the decision architecture matters more than the intention.</p>`,

    s_sh_sleep: `<div class="rich-h2">Managing Sleep with ADHD</div>
<p class="rich-p">Sleep problems are extremely common in ADHD — difficulty switching off at night, delayed sleep phase, and waking feeling unrefreshed are part of the disorder, not just bad habits. Managing sleep well makes everything else easier.</p>
<div class="rich-h3">The ADHD-sleep connection</div>
<ul class="rich-ul">
  <li>The ADHD brain struggles to disengage — thoughts keep firing when you want to wind down</li>
  <li>Delayed sleep phase (being a natural night owl) is more common in ADHD</li>
  <li>Stimulant timing can affect sleep onset — if this is an issue, it is worth discussing with your psychiatrist</li>
</ul>
<div class="rich-h3">What actually helps:</div>
<ul class="rich-ul">
  <li><strong>Bright light therapy:</strong> Morning bright light is one of the higher-yield sleep interventions in ADHD. A 10,000 lux light box, Re-Timer style morning light glasses, or other bright-light glasses used soon after waking can help shift a delayed body clock earlier and improve alertness.</li>
  <li><strong>Consistent wake time:</strong> Getting up at the same time every day — even after a bad night — is the single most evidence-based sleep intervention; it anchors your circadian rhythm.</li>
  <li><strong>Wind-down buffer:</strong> The ADHD brain needs longer to decelerate — allow 45–60 minutes of low-stimulation activity before bed (no problem-solving, no high-stimulation screens).</li>
  <li><strong>Cool room:</strong> Sleeping at around 18°C significantly improves sleep onset and quality.</li>
  <li><strong>Manta Sleep SOUND:</strong> This eye mask lets you listen to audiobooks, white noise, music, or podcasts while also creating a pitch-black sleep environment, which many people find helpful.</li>
  <li><strong>Loop earplugs:</strong> Excellent for sleep and also useful during the day for distraction reduction. Using this link gets you 15% off your first purchase <a href="http://rwrd.io/ref_0FBYY7M?c">http://rwrd.io/ref_0FBYY7M?c</a>.</li>
  <li><strong>Physical activity:</strong> Even a 20-minute walk improves sleep quality measurably in ADHD — timing is flexible, though very late intense exercise can delay sleep onset for some people.</li>
  <li><strong>Reducing evening stimulation:</strong> Phones, social media, and decision-heavy content activate the ADHD brain — creating a lower-stimulation wind-down environment helps.</li>
</ul>
<div class="rich-h3">A note on sleep hygiene advice</div>
<p class="rich-p">Standard sleep hygiene advice (strict bedtime routines, no screens, and similar advice) has surprisingly limited evidence for ADHD specifically. It is not harmful, but it is often presented as the whole solution when it is not. The higher-yield interventions are consistent wake time, morning bright light, and physical activity. If sleep remains a significant problem despite these, there are medication options worth discussing with your psychiatrist.</p>`,


    s_sh_kids: `<div class="rich-h2">Parenting Difficulties with ADHD</div>
<p class="rich-p">Parenting is hard. Parenting with ADHD is harder — and if you have a child who also has ADHD, the demands can be overwhelming. ADHD affects the very skills parenting requires most: consistency, patience, sustained attention, emotional regulation, and planning ahead. This is not a character failure; it is a brain-based challenge.</p>
<div class="rich-h3">What helps</div>
<ul class="rich-ul">
  <li><strong>Reduce cognitive load:</strong> Simplify routines to the minimum viable version. Visual schedules on the wall that both you and your child can follow reduce the number of verbal reminders and arguments.</li>
  <li><strong>Short, specific instructions:</strong> "Shoes on, bag by the door" rather than a chain of instructions. One step at a time works better for ADHD brains — yours and theirs.</li>
  <li><strong>Repair quickly:</strong> ADHD parents often lose patience and say things they regret. A quick, genuine repair — "I got angry and that wasn't fair, I'm sorry" — matters more to long-term relationship quality than having never lost patience.</li>
  <li><strong>Your own medication:</strong> If you are on ADHD medication, taking it consistently (including weekends) makes a measurable difference to parenting patience and follow-through.</li>
  <li><strong>Structure for yourself:</strong> Use the same planning tools for parenting tasks that you use for work tasks — calendars, reminders, checklists. Externalise what you can't hold in working memory.</li>
  <li><strong>Get support:</strong> Parent management training adapted for ADHD families (such as the Triple P or 1-2-3 Magic programmes) has good evidence. If you are struggling significantly, your psychiatrist can refer you.</li>
</ul>`,

    s_sh_partner: `<div class="rich-h2">Relationships and ADHD</div>
<p class="rich-p">ADHD affects relationships in predictable, often painful ways: forgetfulness is misread as not caring, emotional dysregulation creates escalating conflicts, hyperfocus on a new relationship gives way to inattention once novelty fades, and the non-ADHD partner often becomes the default organiser, which breeds resentment over time.</p>
<div class="rich-h3">What helps</div>
<ul class="rich-ul">
  <li><strong>Externalise memory:</strong> Shared digital calendars, to-do apps, and household management lists reduce the reliance on the ADHD brain's unreliable internal organisation — and make it visible to your partner that things are being tracked.</li>
  <li><strong>Have a consistent check-in:</strong> A brief weekly conversation — "what's on this week, what do we each need from the other" — prevents the accumulation of unvoiced frustrations and missed commitments.</li>
  <li><strong>Separate intent from impact:</strong> Forgetting your partner's important appointment is not the same as not caring about them. Acknowledging the impact without defensiveness, and problem-solving together (what system would help?), is more productive than the "I didn't mean to" / "but you always" loop.</li>
  <li><strong>Discuss the diagnosis together:</strong> If your partner understands ADHD as a brain-based condition rather than selfishness or immaturity, it changes the frame. Many couples find couples therapy — particularly with a therapist familiar with ADHD — helpful.</li>
  <li><strong>The ADHD partner's responsibility:</strong> Having ADHD explains your difficulties; it does not remove the responsibility to work on them. Partners need to see consistent effort, even when the effort looks different from neurotypical organisation.</li>
</ul>`,

    s_sh_commsadult: `<div class="rich-h2">Communicating Effectively with an Adult Who Has ADHD</div>
<p class="rich-p">If you are reading this because someone in your life has ADHD — or because you want to share it with them — here are practical communication approaches that work with ADHD brains rather than against them.</p>
<div class="rich-h3">What works</div>
<ul class="rich-ul">
  <li><strong>One thing at a time:</strong> A list of instructions — "can you pick up the kids, remember to call the plumber, and don't forget dinner is at 7" — will likely result in one item being remembered. Prioritise and communicate one request per conversation.</li>
  <li><strong>Get attention first:</strong> Say their name and wait for eye contact before giving important information. Starting to speak while they are absorbed in something else means the message is not received.</li>
  <li><strong>Write it down:</strong> Text a request after mentioning it verbally. This is not a slight; it is how ADHD working memory actually works.</li>
  <li><strong>Short, direct, specific:</strong> "The appointment is Friday at 2pm, I've sent you a calendar invite" works. "I mentioned it last week and really hope you haven't forgotten again" doesn't.</li>
  <li><strong>Timing matters:</strong> Raising an important topic when they are in the middle of a task, on the phone, or hyperfocused means it will not be properly heard. Ask "is now a good time?" for important conversations.</li>
  <li><strong>Assume distraction, not disrespect:</strong> If something was forgotten or missed, a curious "did you get a chance to..." lands very differently to an accusatory "you never remember anything I ask."</li>
</ul>`,

    s_sh_commschild: `<div class="rich-h2">Talking With a Child Who Has ADHD</div>
<p class="rich-p">Children with ADHD hear far more correction, criticism, and redirection than their peers — studies suggest up to 20,000 more negative interactions by age 10. The goal is to interrupt that pattern without removing necessary structure.</p>
<div class="rich-h3">What works</div>
<ul class="rich-ul">
  <li><strong>Catch them being good:</strong> Describe the positive behaviour specifically when you see it — "I noticed you put your bag away without being asked, that's great." Vague praise ("good job") is less effective than named praise.</li>
  <li><strong>Instructions: short, specific, one at a time:</strong> "Shoes on" rather than "get ready." "Sit at the table" rather than "stop running around and come and eat your dinner." Wait for compliance before giving the next instruction.</li>
  <li><strong>Get physical proximity and eye contact first:</strong> Calling from another room rarely works. Move close, make eye contact (without demanding it aggressively), then speak.</li>
  <li><strong>Explain the why, briefly:</strong> Children with ADHD respond better to reasons than to authority alone — "we need to leave now because the appointment is at 3 and we need to park" is more effective than "because I said so."</li>
  <li><strong>Use visual supports:</strong> Morning routine charts, step-by-step checklists with pictures, and visible timers reduce the number of verbal prompts needed and give the child autonomy.</li>
  <li><strong>Choose your battles:</strong> If everything is a battle, the currency of correction is devalued. Reserve firm limits for safety and non-negotiables; let minor things go.</li>
  <li><strong>Avoid public correction where possible:</strong> ADHD children are often already hyperaware of being different. Quiet correction, away from peers, is more effective and less damaging to self-esteem.</li>
</ul>`,

    s_se_dex: `<div class="rich-h1">Side Effects: Dexamphetamine</div>
<p class="rich-p">Knowing what to expect makes side effects easier to manage. Most are dose-dependent and settle within the first 1-2 weeks. If they do not, the dose may need adjusting rather than simply tolerating them.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Reduced appetite — most noticeable at lunchtime</li>
  <li>Dry mouth</li>
  <li>Insomnia if taken too late in the day</li>
  <li>Increased heart rate</li>
  <li>Headache (usually settles within 2-3 weeks)</li>
  <li>Irritability or anxiety in a subset of people</li>
  <li>Jaw clenching (bruxism)</li>
  <li>Rebound: a drop in mood or focus as the medication wears off (more common with short-acting formulations)</li>
</ul>
<div class="rich-h2">Less common</div>
<ul class="rich-ul">
  <li>Elevated blood pressure — monitored at your appointments</li>
  <li>Emotional blunting at higher doses (reduce dose if this occurs)</li>
  <li>In people with bipolar disorder, stimulants can occasionally trigger mania — contact your doctor if you notice elevated mood, reduced sleep need, or rapid speech</li>
</ul>
<div class="rich-h2">Food and drug interactions</div>
<ul class="rich-ul">
  <li>Acidic drinks (fruit juice, vitamin C, soft drinks) reduce absorption — take your medication first, then have breakfast or wait 30 minutes</li>
  <li>Decongestants (pseudoephedrine): discuss with your doctor before combining, as cardiovascular effects can add up</li>
  <li>MAOIs: absolute contraindication — do not combine under any circumstances</li>
</ul>`,

    s_se_vyvanse: `<div class="rich-h1">Side Effects: Vyvanse</div>

    s_se_ritalinLA: `<div class="rich-h1">Side Effects: Ritalin LA</div>

    s_se_concerta: `<div class="rich-h1">Side Effects: Concerta</div>

    s_se_strattera: `<div class="rich-h1">Side Effects: Strattera</div>
<p class="rich-p">Atomoxetine's side effects differ from stimulants — it does not affect dopamine directly, so there is no rebound or appetite suppression in the same way. However, it has its own profile to be aware of.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Nausea or stomach discomfort — taking with food reduces this significantly</li>
  <li>Dry mouth</li>
  <li>Constipation</li>
  <li>Dizziness</li>
  <li>Mood changes — some people notice increased anxiety or irritability during the titration phase</li>
  <li>Urinary hesitancy</li>
  <li>Reduced appetite — milder than with stimulants</li>
  <li>Insomnia in some, sedation in others</li>
</ul>
<div class="rich-h2">Rare but important</div>
<ul class="rich-ul">

</ul>
<div class="rich-h2">Drug interactions</div>
<ul class="rich-ul">
  <li>Fluoxetine (Prozac), paroxetine (Aropax), or bupropion: dramatically increase atomoxetine blood levels — inform your prescriber of all medications</li>
  <li>Salbutamol (Ventolin): may increase cardiovascular effects when combined</li>
</ul>`,

    s_se_intuniv: `<div class="rich-h1">Side Effects: Intuniv</div>
<p class="rich-p">Guanfacine acts on blood pressure pathways as well as ADHD circuits, so its side effects reflect both actions. Most settle after the first few weeks at a stable dose.</p>
<div class="rich-h2">Common side effects</div>
<ul class="rich-ul">
  <li>Drowsiness and sedation — especially in the first weeks. This often improves with time. Taking the dose in the evening can help.</li>
  <li>Low blood pressure — can cause dizziness, especially when standing up quickly</li>
  <li>Slow heart rate (bradycardia)</li>
  <li>Headache</li>
  <li>Dry mouth</li>
  <li>Constipation</li>
  <li>Stomach discomfort</li>
</ul>
<div class="rich-h2">Critical: do not stop suddenly</div>
<p class="rich-p">Stopping guanfacine abruptly can cause a rebound rise in blood pressure and heart rate. Always taper the dose gradually under your doctor's guidance. Do not run out without a plan.</p>
<div class="rich-h2">Drug interactions</div>
<ul class="rich-ul">
  <li>Other blood pressure medications: effects can add up — ensure all your doctors know you are on guanfacine</li>
  <li>Avoid high-fat meals at the time of dose — they increase absorption and can worsen side effects</li>
</ul>`,

<div class="rich-h2">Critical: do not stop suddenly</div>
<p class="rich-p">Stopping clonidine abruptly can cause a rebound rise in blood pressure and heart rate. Always taper the dose gradually under your doctor's guidance.</p>
<div class="rich-h2">Drug interactions</div>
<ul class="rich-ul">
  <li>Alcohol significantly increases sedation — avoid or strictly limit alcohol while taking clonidine</li>
  <li>Other blood pressure medications: effects can add up — ensure all your doctors know you are on clonidine</li>

    s_ri_asd: `<div class="rich-h1">Related Issues</div><div class="rich-h2">ADHD and Autism Spectrum Disorder / Autistic Traits</div>
<p class="rich-p">ADHD and autism spectrum disorder (ASD) co-occur in around 50–70% of cases — far more than chance. For decades they were considered mutually exclusive; that exclusion was removed in DSM-5 (2013). Many people receive one diagnosis years before the other, and the overlap can make both harder to recognise.</p>
<div class="rich-h3">How the combination presents</div>
<ul class="rich-ul">
<li class="rich-li"><strong>Sensory sensitivities</strong> are often more prominent than in ADHD alone — textures, sounds, lighting, and crowds can be overwhelming.</li>
<li class="rich-li"><strong>Masking</strong> is extremely common, particularly in women diagnosed late. The effort of masking autistic traits is cognitively exhausting and can look like ADHD inattention or fatigue.</li>
<li class="rich-li"><strong>Social difficulties</strong> differ in quality: ADHD produces impulsive, enthusiasm-driven social errors; ASD produces difficulty reading implicit social rules.</li>
<li class="rich-li"><strong>Emotional dysregulation</strong> tends to be more intense in the combined presentation, beyond typical ADHD emotional reactivity.</li>

<div class="rich-h3">Treatment considerations</div>

<p class="rich-p">Anxiety is the most common co-occurring condition in ADHD, present in around 50% of adults. It can be a separate condition, a downstream consequence of unmanaged ADHD, or both.</p>
<div class="rich-h3">ADHD-driven anxiety vs independent GAD</div>
<p class="rich-p">Much of what looks like generalised anxiety in ADHD is the product of ADHD itself: chronic disorganisation generates low-level worry; poor time management produces anticipatory anxiety; rejection sensitivity creates social anxiety. When ADHD is treated effectively, this type of anxiety often substantially reduces without specific anxiety treatment.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Anxiety can mask ADHD</strong> — an anxious person may appear organised because anxiety drives compensatory over-preparation, concealing underlying ADHD. Particularly common in women diagnosed late.</li>
<li class="rich-li"><strong>Stimulants and anxiety</strong> — stimulant medications can worsen anxiety in some people. Atomoxetine or guanfacine may be better tolerated. Many find better ADHD control outweighs mild stimulant-related anxiety.</li>

</ul>
<p class="rich-p">Treat ADHD first and reassess anxiety. If significant anxiety persists, it warrants its own treatment — typically CBT and/or an SSRI. Avoid benzodiazepines in ADHD given impulsivity risk.</p>`,

<p class="rich-p">Depression co-occurs in approximately 30–40% of adults with ADHD. It can be primary (a separate depressive disorder) or secondary (a consequence of chronic impairment, underachievement, and self-blame).</p>
<div class="rich-h3">How ADHD produces depressive symptoms</div>
<p class="rich-p">Repeated failure despite effort, chronic disorganisation, and a pervasive sense of not living up to potential erode self-esteem over time. Many describe a lifelong narrative of "I should be able to do this — why can't I?" That narrative, sustained over years, produces depressive cognition difficult to separate from a primary mood disorder.</p>
<ul class="rich-ul">
<li class="rich-li"><strong>Low mood in ADHD</strong> is often reactive and fluctuating — linked to specific failures or rejections, lifting rapidly with positive stimulation.</li>

  return sections[id] || '';
}

// ========== STATE ==========
let currentId = null;
let readIds = new Set();
let allTileIds = [];

// Build flat list
TILE_CATEGORIES.forEach(cat => {
  cat.tiles.forEach(tile => {
    if (!allTileIds.includes(tile.id)) allTileIds.push(tile.id);
  });
});

// ========== BUILD TILES ==========
function buildTiles() {
  const container = document.getElementById('tileCategories');
  container.innerHTML = '';
  TILE_CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'section-category';
    section.innerHTML = `
      <div class="section-cat-header">
        <h2 class="section-cat-title">${cat.title}</h2>
      </div>
      <div class="tile-grid" id="grid-${cat.title.replace(/[^a-z0-9]/gi, '')}"></div>
    `;
    container.appendChild(section);

    const grid = section.querySelector('.tile-grid');
    cat.tiles.forEach(tile => {
      const sec = SECTIONS.find(s => s.id === tile.id);
      if (!sec) return;
      const btn = document.createElement('button');
      btn.className = `tile tile-${tile.color}`;
      btn.dataset.id = tile.id;
      btn.dataset.label = tile.label.toLowerCase();
      btn.innerHTML = `
        <div class="tile-emoji">${tile.emoji}</div>
        <div class="tile-label">${tile.label}</div>
      `;
      btn.addEventListener('click', () => navigateTo(tile.id));
      grid.appendChild(btn);
    });
  });
}

// ========== NAVIGATION ==========
function navigateTo(id) {
  currentId = id;
  readIds.add(id);

  document.getElementById('welcomeScreen').style.display = 'none';
  const articleView = document.getElementById('articleView');
  articleView.className = 'article active';

  const sec = SECTIONS.find(s => s.id === id);
  document.getElementById('articleTitle').textContent = sec?.label || '';

  // Stub patient-name input
  let pn = document.getElementById('patient-name');
  if (!pn) {
    pn = document.createElement('input');
    pn.id = 'patient-name';
    pn.value = '';
    pn.style.display = 'none';
    document.body.appendChild(pn);
  }

  const html = getSectionHTML(id);
  const content = document.getElementById('articleContent');
  const cleanHtml = html.replace(/<div class="rich-h1">[^<]*<\/div>\s*/, '');
  content.innerHTML = cleanHtml || '<p class="rich-p" style="color:var(--text-faint)">Content coming soon.</p>';

  buildPrevNext(id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateProgress();
}

function buildPrevNext(id) {
  const idx = allTileIds.indexOf(id);
  const footer = document.getElementById('articleFooter');
  let html = '';
  if (idx > 0) {
    const prevId = allTileIds[idx - 1];
    const prevSec = SECTIONS.find(s => s.id === prevId);
    if (prevSec) html += `<button class="prev-next-btn" onclick="navigateTo('${prevId}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <div class="pn-content"><span class="pn-label">Previous</span><div class="pn-title">${prevSec.label}</div></div>
    </button>`;
  } else html += '<div></div>';
  if (idx < allTileIds.length - 1) {
    const nextId = allTileIds[idx + 1];
    const nextSec = SECTIONS.find(s => s.id === nextId);
    if (nextSec) html += `<button class="prev-next-btn" onclick="navigateTo('${nextId}')">
      <div class="pn-content" style="text-align:right"><span class="pn-label">Next</span><div class="pn-title">${nextSec.label}</div></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>`;
  }
  footer.innerHTML = html;
}

function showWelcome() {
  currentId = null;
  document.getElementById('welcomeScreen').style.display = '';
  document.getElementById('articleView').className = 'article';
  document.getElementById('welcomeSearch').value = '';
  filterTiles('');
}

// ========== SEARCH ==========
function filterTiles(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tile').forEach(tile => {
    const label = tile.dataset.label || '';
    tile.classList.toggle('tile-hidden', q && !label.includes(q));
  });
  document.querySelectorAll('.section-category').forEach(cat => {
    const visible = cat.querySelectorAll('.tile:not(.tile-hidden)');
    cat.style.display = visible.length ? '' : 'none';
  });
}

// ========== PROGRESS ==========
function updateProgress() {
  const pct = allTileIds.length ? Math.round((readIds.size / allTileIds.length) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ========== UTILS ==========
function copyArticle() {
  const text = document.getElementById('articleContent').innerText;
  navigator.clipboard.writeText(text).then(() => showToast('✓ Copied!'));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ========== DARK MODE ==========
(function() {
  const r = document.documentElement;
  const t = document.getElementById('themeToggle');
  let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  function setIcon(theme) {
    t.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  setIcon(d);
  t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    setIcon(d);
  });
})();

// ========== INIT ==========
